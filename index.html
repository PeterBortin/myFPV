<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>myFPV - Combat Mission v4.3</title>
    <style>
        * { 
            margin: 0; padding: 0; 
            user-select: none; -webkit-user-select: none;
            touch-action: none; 
        }
        body { background: #020202; font-family: monospace; overflow: hidden; }
        canvas { display: block; }
        
        .osd-panel {
            position: absolute; top: 20px;
            color: #00ff00; z-index: 5; font-size: 11px;
            pointer-events: none;
            background: rgba(0, 30, 0, 0.5);
            padding: 10px;
            border: 1px solid rgba(0,255,0,0.2);
        }

        #osd-left { left: 20px; min-width: 150px; }
        #osd-right { right: 20px; width: 120px; height: 60px; }

        #minimap-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        #minimap-canvas { background: transparent; }
        #minimap-arrow {
            position: absolute; top: 50%; left: 50%;
            width: 0; height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-bottom: 8px solid #00ff00;
            transform: translate(-50%, -50%);
        }

        #target-ui {
            position: absolute; width: 60px; height: 60px;
            border: 2px solid #ff0000; border-radius: 2px;
            display: none; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 10;
        }
        #target-ui::before, #target-ui::after {
            content: ''; position: absolute; width: 10px; height: 10px; border-color: #ff0000; border-style: solid;
        }
        #target-ui::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
        #target-ui::after { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

        #target-label {
            position: absolute; top: -20px; left: 50%;
            transform: translateX(-50%); color: #ff0000; font-size: 10px;
            white-space: nowrap; font-weight: bold;
        }

        #mission-info { margin-top: 8px; border-top: 1px dashed #00ff00; padding-top: 5px; color: #ffff00; }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 40px; height: 40px;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: #00ff00; opacity: 0.5;
        }
        #crosshair::before { width: 100%; height: 1px; top: 50%; left: 0; }
        #crosshair::after { height: 100%; width: 1px; left: 50%; top: 0; }

        #joystick-left, #joystick-right {
            position: absolute; bottom: 10%;
            width: 140px; height: 140px; z-index: 20; opacity: 0.6;
        }
        #joystick-left { left: 5%; }
        #joystick-right { right: 5%; }

        #restart-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            text-align: center; display: none; z-index: 1000; color: #ff0000;
            background: rgba(0,0,0,0.9);
        }
        
        #static-noise {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_noise.gif');
            opacity: 0.4; pointer-events: none; display: none; z-index: 900;
        }

        #radio-log {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: #ff0000; font-size: 12px; font-weight: bold; text-shadow: 0 0 5px #000;
            pointer-events: none; z-index: 15; text-transform: uppercase;
        }

        .screen-content {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); padding: 40px; border: 2px solid #ff0000;
        }

        button {
            background: #ff0000; color: white; border: none;
            padding: 12px 25px; font-family: monospace;
            cursor: pointer; font-size: 18px; margin-top: 20px;
        }
        
        .success { color: #00ff00; border-color: #00ff00 !important; }
        .success button { background: #00ff00; color: black; }

        #start-prompt {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 2000; display: flex;
            justify-content: center; align-items: center; color: #00ff00;
        }
    </style>
</head>
<body>
    <div id="start-prompt">
        <div style="text-align:center;">
            <h2>SYSTEM READY</h2>
            <button onclick="initAudio(); this.parentElement.parentElement.style.display='none'">INITIALIZE LINK</button>
        </div>
    </div>

    <div id="osd-left" class="osd-panel">
        <div>FPV-DRONE v4.3 (LIVE)</div>
        <div id="alt">ALT: 0.0m</div>
        <div id="spd">SPD: 0km/h</div>
        <div id="mission-info">
            OBJ: SEARCHING...<br>
            DST: ---
        </div>
        <div id="status" style="margin-top:5px; color:#00ff00;">LINK: STABLE</div>
    </div>

    <div id="osd-right" class="osd-panel">
        <div id="minimap-container">
            <canvas id="minimap-canvas"></canvas>
            <div id="minimap-arrow"></div>
        </div>
    </div>

    <div id="target-ui"><div id="target-label">LOCK</div></div>
    <div id="crosshair"></div>
    <div id="joystick-left"></div>
    <div id="joystick-right"></div>
    <div id="static-noise"></div>
    <div id="radio-log"></div>

    <div id="restart-screen">
        <div class="screen-content" id="screen-box">
            <h1 id="res-msg">LOST TELEMETRY</h1>
            <button onclick="location.reload()">RE-START SYSTEM</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <script>
        const PHYSICS = { acceleration: 80.0, friction: 0.97, rotationSpeed: 3.5, tiltMax: 0.7, lift: 52.0 };
        const CHUNK_SIZE = 200;
        const TRACER_SPEED = 180;

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020202, 0.008); 
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x020202, 1);
        document.body.appendChild(renderer.domElement);

        const clock = new THREE.Clock();
        let isGameOver = false;
        let isStaticActive = false;
        let currentMissionTarget = null;

        const droneState = { pos: new THREE.Vector3(0, 15, 0), vel: new THREE.Vector3(0, 0, 0), rotY: 0, tiltX: 0, tiltZ: 0 };
        let droneGroup, payloadGroup, props = [];
        const entities = [];
        const staticObstacles = [];
        const tracers = [];
        const activeChunks = new Set();
        const particles = [];

        // Audio System
        let audioCtx, droneOsc, droneGain;
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            droneOsc = audioCtx.createOscillator();
            droneOsc.type = 'sawtooth';
            droneGain = audioCtx.createGain();
            droneGain.gain.value = 0.05;
            const lpf = audioCtx.createBiquadFilter();
            lpf.type = 'lowpass'; lpf.frequency.value = 800;
            droneOsc.connect(lpf); lpf.connect(droneGain); droneGain.connect(audioCtx.destination);
            droneOsc.start();
        }

        function playGunshot() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = Math.random() > 0.5 ? 'square' : 'triangle';
            const freq = 120 + Math.random() * 60;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.15);
            g.gain.setValueAtTime(0.08, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        function playStaticGlitch() {
            if(!audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const ng = audioCtx.createGain();
            ng.gain.setValueAtTime(0.1, audioCtx.currentTime);
            ng.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);
            noise.connect(ng); ng.connect(audioCtx.destination);
            noise.start();
        }

        // Particle System for Explosion
        function createExplosion(pos) {
            const count = 40;
            const geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            for(let i=0; i<count; i++) {
                const mat = new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? 0xffaa00 : 0xff0000 });
                const p = new THREE.Mesh(geo, mat);
                p.position.copy(pos);
                const vel = new THREE.Vector3((Math.random()-0.5)*25, Math.random()*20, (Math.random()-0.5)*25);
                particles.push({ mesh: p, vel: vel, life: 1.0 + Math.random() });
                scene.add(p);
            }
        }

        const pathLineGeo = new THREE.BufferGeometry();
        const pathLineMat = new THREE.LineDashedMaterial({ color: 0xffff00, dashSize: 2, gapSize: 2 });
        const pathLine = new THREE.Line(pathLineGeo, pathLineMat);
        scene.add(pathLine);

        const mCanvas = document.getElementById('minimap-canvas');
        const mCtx = mCanvas.getContext('2d');
        mCanvas.width = 120; mCanvas.height = 120;

        function getTerrainHeight(x, z) {
            let h = (Math.sin(x * 0.015) * Math.cos(z * 0.015) * 15) + (Math.sin(x * 0.05) * 4);
            let sign = Math.sign(h); h = Math.abs(h);
            if (h < 8) h = Math.pow(h / 8, 3.0) * 8;
            return h * sign;
        }

        function createGround() {
            const size = 2000, res = 150;
            const geo = new THREE.PlaneGeometry(size, size, res, res);
            geo.rotateX(-Math.PI / 2);
            const vertices = geo.attributes.position.array;
            for (let i = 0; i < vertices.length; i += 3) {
                vertices[i + 1] = getTerrainHeight(vertices[i], vertices[i + 2]);
            }
            geo.computeVertexNormals();
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true, transparent: true, opacity: 0.07 });
            scene.add(new THREE.Mesh(geo, mat));
        }

        function createDetailedDrone() {
            droneGroup = new THREE.Group();
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
            const armGeo = new THREE.BoxGeometry(1.6, 0.05, 0.05);
            const arm1 = new THREE.Mesh(armGeo, mat); arm1.rotation.y = Math.PI/4;
            const arm2 = new THREE.Mesh(armGeo, mat); arm2.rotation.y = -Math.PI/4;
            droneGroup.add(arm1, arm2);
            const bodyGeo = new THREE.BoxGeometry(0.4, 0.25, 0.5);
            droneGroup.add(new THREE.Mesh(bodyGeo, mat));

            payloadGroup = new THREE.Group();
            const mineBody = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.6, 8), mat);
            mineBody.rotation.x = Math.PI/2;
            const mineNose = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.08, 0.2, 8), mat);
            mineNose.position.z = -0.4; mineNose.rotation.x = Math.PI/2;
            payloadGroup.add(mineBody, mineNose);
            payloadGroup.position.y = -0.25;
            droneGroup.add(payloadGroup);

            const propGeo = new THREE.BoxGeometry(0.7, 0.01, 0.08);
            const pPositions = [[0.55, 0.1, 0.55], [-0.55, 0.1, 0.55], [0.55, 0.1, -0.55], [-0.55, 0.1, -0.55]];
            pPositions.forEach(pos => {
                const p = new THREE.Mesh(propGeo, mat);
                p.position.set(...pos);
                props.push(p);
                droneGroup.add(p);
            });
            scene.add(droneGroup);
        }

        function spawnObject(type, x, z) {
            const group = new THREE.Group();
            let size = [1,1,1], color = 0x00ff00, moveSpeed = 0;
            const groundY = getTerrainHeight(x, z);
            if(type === 'car') { size = [2, 1.2, 4]; color = 0xff3300; moveSpeed = 15 + Math.random() * 10; }
            else if(type === 'human') { size = [0.5, 1.7, 0.5]; color = 0xffcc00; moveSpeed = 4 + Math.random() * 3; }
            else if(type === 'house') { size = [12+Math.random()*10, 15+Math.random()*40, 12+Math.random()*10]; color = 0x00ff00; }
            else if(type === 'trench') { size = [4, 2.5, 25]; color = 0x555555; }
            
            const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.5 });
            if(type === 'car' || type === 'human') {
                group.add(new THREE.Mesh(new THREE.BoxGeometry(...size), mat));
            } else {
                group.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(...size)), new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.5 })));
            }

            if(type === 'trench') {
                group.position.set(x, groundY - size[1]/3, z);
                group.rotation.y = Math.random() * Math.PI;
                scene.add(group);
                for(let i=0; i<3; i++) spawnSoldierInTrench(x, z, group.rotation.y, (Math.random()-0.5)*18);
            } else {
                group.position.set(x, groundY + size[1]/2, z);
                scene.add(group);
            }
            const ent = { mesh: group, type, radius: (size[0] + size[2]) / 4, height: size[1], speed: moveSpeed, dir: new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0,1,0), Math.random() * Math.PI * 2) };
            if (type === 'house' || type === 'trench') staticObstacles.push(ent); else entities.push(ent);
        }

        function spawnSoldierInTrench(tx, tz, angle, offset) {
            const size = [0.5, 1.7, 0.5];
            const groundY = getTerrainHeight(tx, tz);
            const group = new THREE.Group();
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(...size), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            group.add(mesh);
            const localPos = new THREE.Vector3(0, 0, offset).applyAxisAngle(new THREE.Vector3(0, 1, 0), angle);
            group.position.set(tx + localPos.x, groundY + size[1]/2 - 0.8, tz + localPos.z);
            scene.add(group);
            entities.push({ mesh: group, type: 'soldier', radius: 0.7, height: 1.7, speed: 0, lastFire: 0, spotted: false });
        }

        function createTracer(start, target) {
            const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-4)]);
            const mat = new THREE.LineBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.8 });
            const line = new THREE.Line(geo, mat);
            line.position.copy(start); line.lookAt(target);
            scene.add(line);
            tracers.push({ mesh: line, dir: target.clone().sub(start).normalize(), life: 1.5 });
            playGunshot();
        }

        function updateChunks() {
            const curX = Math.floor(droneState.pos.x / CHUNK_SIZE);
            const curZ = Math.floor(droneState.pos.z / CHUNK_SIZE);
            for (let x = curX - 1; x <= curX + 1; x++) {
                for (let z = curZ - 1; z <= curZ + 1; z++) {
                    const id = `${x},${z}`;
                    if (!activeChunks.has(id)) { generateChunk(x * CHUNK_SIZE, z * CHUNK_SIZE); activeChunks.add(id); }
                }
            }
        }

        function generateChunk(ox, oz) {
            for(let i=0; i<15; i++) spawnObject('house', ox + (Math.random()-0.5)*CHUNK_SIZE, oz + (Math.random()-0.5)*CHUNK_SIZE);
            for(let i=0; i<5; i++) spawnObject('trench', ox + (Math.random()-0.5)*CHUNK_SIZE, oz + (Math.random()-0.5)*CHUNK_SIZE);
            for(let i=0; i<6; i++) {
                spawnObject('car', ox + (Math.random()-0.5)*CHUNK_SIZE, oz + (Math.random()-0.5)*CHUNK_SIZE);
                spawnObject('human', ox + (Math.random()-0.5)*CHUNK_SIZE, oz + (Math.random()-0.5)*CHUNK_SIZE);
            }
        }

        function updateMission() {
            if (!currentMissionTarget || entities.indexOf(currentMissionTarget) === -1) {
                const potential = entities.filter(e => e.type !== 'soldier');
                if (potential.length > 0) currentMissionTarget = potential[Math.floor(Math.random() * potential.length)];
            }
            if (currentMissionTarget) {
                const dist = droneState.pos.distanceTo(currentMissionTarget.mesh.position);
                document.getElementById('mission-info').innerHTML = `OBJ: DESTROY ${currentMissionTarget.type.toUpperCase()}<br>DST: ${dist.toFixed(0)}m`;
                pathLineGeo.setFromPoints([ droneState.pos.clone().setY(droneState.pos.y - 1), currentMissionTarget.mesh.position.clone().setY(getTerrainHeight(currentMissionTarget.mesh.position.x, currentMissionTarget.mesh.position.z) + 0.5)]);
                pathLine.computeLineDistances();
            }
        }

        function updateMinimap() {
            mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height);
            mCtx.save(); mCtx.translate(mCanvas.width/2, mCanvas.height/2); mCtx.rotate(droneState.rotY);
            entities.forEach(ent => {
                const dx = (ent.mesh.position.x - droneState.pos.x) * 0.5, dz = (ent.mesh.position.z - droneState.pos.z) * 0.5;
                if(Math.abs(dx) < 60 && Math.abs(dz) < 60) {
                    mCtx.fillStyle = (ent === currentMissionTarget) ? '#ffff00' : (ent.type === 'soldier' ? '#ffffff' : '#ff3300');
                    mCtx.fillRect(dx - 2, dz - 2, 4, 4);
                }
            });
            mCtx.restore();
        }

        function endGame(success = false) {
            if (isGameOver || isStaticActive) return;
            isStaticActive = true;
            
            if(success) createExplosion(droneState.pos);

            document.getElementById('static-noise').style.display = 'block';
            if(droneGain) droneGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
            playStaticGlitch();

            setTimeout(() => {
                isGameOver = true;
                document.getElementById('restart-screen').style.display = 'block';
                const msg = document.getElementById('res-msg');
                if(success) {
                    document.getElementById('screen-box').className = "screen-content success";
                    msg.innerText = "MISSION SUCCESS: TARGET NEUTRALIZED";
                } else {
                    document.getElementById('screen-box').className = "screen-content";
                    msg.innerText = "LOST TELEMETRY: IMPACT DETECTED";
                }
            }, 1800);
        }

        function updateSeeker() {
            let bestTarget = null; let minDist = 180;
            const targetUI = document.getElementById('target-ui');
            const targetLabel = document.getElementById('target-label');
            entities.forEach(en => {
                const dist = droneState.pos.distanceTo(en.mesh.position);
                if (dist < minDist) {
                    const screenPos = en.mesh.position.clone().project(camera);
                    if (Math.abs(screenPos.z) < 1 && Math.abs(screenPos.x) < 0.8 && Math.abs(screenPos.y) < 0.8) {
                        minDist = dist;
                        bestTarget = { x: (screenPos.x * 0.5 + 0.5) * window.innerWidth, y: (screenPos.y * -0.5 + 0.5) * window.innerHeight, dist: dist, type: en.type, ref: en };
                    }
                }
            });
            if (bestTarget) {
                targetUI.style.display = 'block';
                targetUI.style.left = bestTarget.x + 'px'; targetUI.style.top = bestTarget.y + 'px';
                let tag = (bestTarget.ref === currentMissionTarget) ? 'PRIORITY' : (bestTarget.type === 'soldier' ? 'INFANTRY' : 'TARGET');
                targetUI.style.borderColor = (bestTarget.ref === currentMissionTarget) ? '#ffff00' : '#ff0000';
                targetLabel.innerText = `${tag} [${bestTarget.dist.toFixed(1)}m]`;
                targetLabel.style.color = targetUI.style.borderColor;
            } else targetUI.style.display = 'none';
        }

        let input = { left: {x:0, y:0}, right: {x:0, y:0} };
        nipplejs.create({ zone: document.getElementById('joystick-left'), mode: 'static', position: {left: '50%', top: '50%'}, color: 'green' })
            .on('move', (e, d) => input.left = d.vector).on('end', () => input.left = {x:0, y:0});
        nipplejs.create({ zone: document.getElementById('joystick-right'), mode: 'static', position: {left: '50%', top: '50%'}, color: 'white' })
            .on('move', (e, d) => input.right = d.vector).on('end', () => input.right = {x:0, y:0});

        createGround(); createDetailedDrone();

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);
            const dt = clock.getDelta(), time = clock.getElapsedTime();

            updateChunks(); updateMinimap(); updateSeeker(); updateMission();

            if(audioCtx && !isStaticActive) {
                const speedMult = droneState.vel.length() / 20;
                droneOsc.frequency.setTargetAtTime(80 + (input.left.y * 45) + (speedMult * 65), audioCtx.currentTime, 0.1);
            }

            // Controls
            props.forEach((p, i) => p.rotation.y += (35 + (input.left.y + 1) * 40) * dt * (i % 2 === 0 ? 1 : -1));
            droneState.rotY -= input.left.x * PHYSICS.rotationSpeed * dt;
            droneState.tiltX = THREE.MathUtils.lerp(droneState.tiltX, -input.right.y * PHYSICS.tiltMax, 0.1);
            droneState.tiltZ = THREE.MathUtils.lerp(droneState.tiltZ, -input.right.x * PHYSICS.tiltMax, 0.1);
            const moveDir = new THREE.Vector3(input.right.x, 0, -input.right.y).applyAxisAngle(new THREE.Vector3(0, 1, 0), droneState.rotY);
            droneState.vel.addScaledVector(moveDir, PHYSICS.acceleration * dt);
            droneState.vel.y += (input.left.y * PHYSICS.lift - 9.81) * dt;
            droneState.vel.multiplyScalar(PHYSICS.friction);
            droneState.pos.addScaledVector(droneState.vel, dt);

            droneGroup.position.copy(droneState.pos);
            droneGroup.rotation.set(0, 0, 0);
            droneGroup.rotateY(droneState.rotY); droneGroup.rotateX(droneState.tiltX); droneGroup.rotateZ(droneState.tiltZ);
            payloadGroup.rotation.x = THREE.MathUtils.lerp(payloadGroup.rotation.x, droneState.tiltX * 0.3, 0.1);
            payloadGroup.rotation.z = THREE.MathUtils.lerp(payloadGroup.rotation.z, droneState.tiltZ * 0.3, 0.1);

            camera.position.lerp(droneState.pos.clone().add(new THREE.Vector3(0, 3, 8).applyAxisAngle(new THREE.Vector3(0, 1, 0), droneState.rotY)), 0.12);
            camera.lookAt(droneState.pos.clone().add(new THREE.Vector3(0, -1, 0)));

            for(let i = tracers.length-1; i >= 0; i--) {
                const t = tracers[i];
                t.mesh.position.addScaledVector(t.dir, TRACER_SPEED * dt);
                t.life -= dt; if(t.life <= 0) { scene.remove(t.mesh); tracers.splice(i, 1); }
            }

            // Particles Update
            for(let i = particles.length-1; i >= 0; i--) {
                const p = particles[i];
                p.mesh.position.addScaledVector(p.vel, dt);
                p.vel.y -= 9.81 * dt; // Gravity
                p.life -= dt;
                p.mesh.scale.setScalar(p.life);
                if(p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }

            entities.forEach(en => {
                if(en.type === 'soldier') {
                    const d = en.mesh.position.distanceTo(droneState.pos);
                    if(d < 80) {
                        if(!en.spotted) {
                            en.spotted = true;
                            document.getElementById('radio-log').innerText = "HQ: TARGET SPOTTED! OPEN FIRE!";
                            setTimeout(() => document.getElementById('radio-log').innerText = "", 3000);
                        }
                        if(time > en.lastFire) {
                            createTracer(en.mesh.position.clone().add(new THREE.Vector3(0,1,0)), droneState.pos.clone().addScaledVector(droneState.vel, 0.15));
                            en.lastFire = time + 0.7 + Math.random();
                        }
                    } else en.spotted = false;
                }
                if(en.speed > 0) {
                    en.mesh.position.addScaledVector(en.dir, en.speed * dt);
                    en.mesh.position.y = getTerrainHeight(en.mesh.position.x, en.mesh.position.z) + en.height/2;
                }
                if (droneState.pos.distanceTo(en.mesh.position) < (en.radius + 1.2)) {
                    if (en === currentMissionTarget || en.type === 'soldier' || en.type === 'human') endGame(true);
                }
            });

            const curH = getTerrainHeight(droneState.pos.x, droneState.pos.z);
            if(droneState.pos.y < curH) endGame(false);
            staticObstacles.forEach(h => {
                const d = new THREE.Vector2(droneState.pos.x, droneState.pos.z).distanceTo(new THREE.Vector2(h.mesh.position.x, h.mesh.position.z));
                if (d < h.radius && droneState.pos.y < (h.mesh.position.y + h.height/2)) endGame(false);
            });

            document.getElementById('alt').innerText = `ALT: ${(droneState.pos.y - curH).toFixed(1)}m`;
            document.getElementById('spd').innerText = `SPD: ${(droneState.vel.length() * 3.6).toFixed(0)}km/h`;
            renderer.render(scene, camera);
        }

        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
