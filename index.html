<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>myFPV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" media="all">
<style>
/* fonts: Share Tech Mono, Orbitron -- loaded via <link> above */
*{margin:0;padding:0;user-select:none;-webkit-user-select:none;touch-action:none;box-sizing:border-box;}
body{background:#000;font-family:'Share Tech Mono',monospace;overflow:hidden;}
canvas{display:block;}

/* ── FX OVERLAYS ── */
#scanlines{position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.13) 2px,rgba(0,0,0,.13) 4px);pointer-events:none;z-index:50;mix-blend-mode:multiply;}
#vignette{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,transparent 38%,rgba(0,0,0,.88) 100%);pointer-events:none;z-index:51;}
#chromatic{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:49;mix-blend-mode:screen;background:transparent;transition:opacity .1s;opacity:0;}
#chromatic.active{opacity:1;background:linear-gradient(90deg,rgba(255,0,0,.05) 0%,transparent 25%,transparent 75%,rgba(0,80,255,.05) 100%);}

/* ── PROXIMITY NOISE ── */
#prox-noise{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:85;opacity:0;}
#prox-noise-canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
#prox-glitch{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:86;opacity:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.025) 2px,rgba(255,255,255,.025) 4px);mix-blend-mode:screen;}
#prox-glitch.on{opacity:1;animation:gsh .08s infinite;}
@keyframes gsh{0%{transform:translate(0,0);}25%{transform:translate(-2px,1px);}50%{transform:translate(2px,-1px);filter:hue-rotate(80deg);}75%{transform:translate(-1px,2px);}100%{transform:translate(0,0);}}
#prox-border{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:87;opacity:0;}

/* ── HEADING DRUM ── */
#heading-tape{position:absolute;top:20px;left:50%;transform:translateX(-50%);width:300px;height:32px;overflow:hidden;border:1px solid rgba(57,255,20,.35);background:rgba(0,12,0,.78);backdrop-filter:blur(4px);z-index:61;pointer-events:none;}
#heading-tape::before{content:'▼';position:absolute;bottom:0;left:50%;transform:translateX(-50%);font-size:8px;color:#39ff14;line-height:1;z-index:2;text-shadow:0 0 6px #39ff14;}
#heading-tape::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,rgba(0,12,0,.92) 0%,transparent 22%,transparent 78%,rgba(0,12,0,.92) 100%);z-index:1;}
#heading-drum{display:flex;align-items:center;height:100%;font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(57,255,20,.55);white-space:nowrap;position:relative;}
.hdg-tick{display:inline-flex;flex-direction:column;align-items:center;min-width:22px;height:32px;justify-content:center;flex-shrink:0;}
.hdg-tick.major{color:#39ff14;font-size:11px;font-weight:bold;text-shadow:0 0 8px #39ff14;}
.hdg-tick.minor{color:rgba(57,255,20,.35);font-size:8px;}
#heading-readout{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:#39ff14;text-shadow:0 0 10px #39ff14;background:rgba(0,12,0,.82);padding:0 6px;border-radius:2px;z-index:3;pointer-events:none;}

/* ── FULL-WIDTH MAP BAR 80px under drum ── */
#map-bar{position:absolute;top:62px;left:0;right:0;height:80px;pointer-events:none;z-index:60;border-top:1px solid rgba(57,255,20,.25);border-bottom:1px solid rgba(57,255,20,.3);overflow:hidden;background:rgba(0,8,0,.6);}
#map-bar canvas{display:block;width:100%;height:80px;}
#map-sweep{position:absolute;top:0;left:0;width:100%;height:100%;background:conic-gradient(from 0deg,rgba(57,255,20,.07) 0deg,transparent 50deg,transparent 360deg);animation:sweep 4s linear infinite;pointer-events:none;}
#map-arrow{position:absolute;top:50%;left:50%;width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:9px solid #39ff14;filter:drop-shadow(0 0 3px #39ff14);transform:translate(-50%,-50%);z-index:6;}
#map-cross-h{position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(57,255,20,.12);pointer-events:none;}
#map-cross-v{position:absolute;top:0;bottom:0;left:50%;width:1px;background:rgba(57,255,20,.12);pointer-events:none;}
@keyframes sweep{to{transform:rotate(360deg);}}

/* ── OSD LEFT ── */
#osd-left{position:absolute;top:152px;left:10px;color:#39ff14;font-family:'Share Tech Mono',monospace;font-size:11px;pointer-events:none;z-index:60;line-height:1.7;background:linear-gradient(135deg,rgba(0,20,0,.72),rgba(0,40,0,.45));border:1px solid rgba(57,255,20,.28);border-left:3px solid #39ff14;padding:10px 12px;min-width:160px;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%);}
#osd-left::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,#39ff14,transparent);}
.hud-label{color:rgba(57,255,20,.45);font-size:8px;letter-spacing:2px;text-transform:uppercase;}
.mission-target{color:#ff4444;text-shadow:0 0 8px #ff4444;font-size:12px;}
.mission-dist{color:#ffff00;text-shadow:0 0 6px #ffff00;}
#god-status{margin-top:6px;color:#ff6600;font-size:9px;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ── ALT TAPE RIGHT ── */
#alt-tape{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:52px;height:210px;overflow:visible;z-index:60;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:transparent;}
#alt-tape::after{content:'';position:absolute;left:3px;right:3px;top:50%;height:1px;background:rgba(57,255,20,.55);box-shadow:0 0 4px rgba(57,255,20,.6);}
#alt-border{position:absolute;top:0;bottom:0;right:0;width:1px;background:linear-gradient(180deg,transparent,rgba(57,255,20,.5) 20%,rgba(57,255,20,.5) 80%,transparent);}
#alt-big{font-size:19px;color:#39ff14;text-shadow:0 0 12px #39ff14;font-family:'Orbitron',monospace;font-weight:700;}
#alt-unit{font-size:8px;color:rgba(57,255,20,.5);letter-spacing:2px;}
.tape-tick{width:100%;display:flex;align-items:center;justify-content:flex-end;padding-right:4px;gap:3px;}
.tick-line{height:1px;background:rgba(57,255,20,.4);}.tick-num{font-size:7px;color:rgba(57,255,20,.45);}

/* ── SPD TAPE LEFT ── */
#spd-tape{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:52px;height:210px;overflow:visible;z-index:60;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:transparent;}
#spd-tape::after{content:'';position:absolute;left:3px;right:3px;top:50%;height:1px;background:rgba(0,255,255,.55);box-shadow:0 0 4px rgba(0,255,255,.6);}
#spd-border{position:absolute;top:0;bottom:0;left:0;width:1px;background:linear-gradient(180deg,transparent,rgba(0,255,255,.5) 20%,rgba(0,255,255,.5) 80%,transparent);}
#spd-big{font-size:19px;color:#00ffff;text-shadow:0 0 12px #00ffff;font-family:'Orbitron',monospace;font-weight:700;}
#spd-unit{font-size:8px;color:rgba(0,255,255,.5);letter-spacing:2px;}
.tick-line-c{height:1px;background:rgba(0,255,255,.4);}.tick-num-c{font-size:7px;color:rgba(0,255,255,.45);}

/* ── TARGET LOCK ── */
#target-ui{position:absolute;width:80px;height:80px;display:none;transform:translate(-50%,-50%);pointer-events:none;z-index:60;}
#target-inner{width:100%;height:100%;border:1.5px solid rgba(255,40,40,.9);border-radius:2px;position:relative;animation:lp 1s infinite;}
#target-ui.priority #target-inner{border-color:rgba(255,255,0,.95);animation:lpy .6s infinite;}
@keyframes lp{0%,100%{box-shadow:0 0 8px rgba(255,40,40,.5),inset 0 0 8px rgba(255,40,40,.1);}50%{box-shadow:0 0 20px rgba(255,40,40,.8),inset 0 0 15px rgba(255,40,40,.2);}}
@keyframes lpy{0%,100%{box-shadow:0 0 10px rgba(255,255,0,.6),inset 0 0 10px rgba(255,255,0,.15);}50%{box-shadow:0 0 28px rgba(255,255,0,.9),inset 0 0 20px rgba(255,255,0,.25);}}
.corner{position:absolute;width:12px;height:12px;border-color:inherit;border-style:solid;}
.tl{top:-1px;left:-1px;border-width:2px 0 0 2px;}.tr{top:-1px;right:-1px;border-width:2px 2px 0 0;}.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px;}.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}
#target-label{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;color:inherit;font-size:9px;white-space:nowrap;letter-spacing:2px;text-shadow:0 0 8px currentColor;}
#target-dist{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);color:#fff;font-size:9px;background:rgba(255,40,40,.6);padding:1px 5px;letter-spacing:1px;}
.priority #target-dist{background:rgba(255,200,0,.7);color:#000;}

/* ── CROSSHAIR ── */
#crosshair{position:absolute;top:50%;left:50%;width:50px;height:50px;transform:translate(-50%,-50%);pointer-events:none;z-index:60;}
.ch-h,.ch-v{position:absolute;background:rgba(57,255,20,.55);}
.ch-h{width:20px;height:1px;top:50%;}.ch-h.left{right:60%;}.ch-h.right{left:60%;}
.ch-v{height:20px;width:1px;left:50%;}.ch-v.top{bottom:60%;}.ch-v.bottom{top:60%;}
.ch-dot{position:absolute;width:3px;height:3px;background:rgba(57,255,20,.9);top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;box-shadow:0 0 6px #39ff14;}

/* ── MODERNIZED JOYSTICK DESIGN ── */
#joystick-left,#joystick-right{position:absolute;bottom:8%;width:150px;height:150px;z-index:100;opacity:0.85;}
#joystick-left{left:5%;}
#joystick-right{right:5%;}

/* Nipple overrides */
.nipple .back{
background:rgba(0,0,0,0) !important;
border:none !important;
box-shadow:none !important;
}
.nipple .front{
background:rgba(57,255,20,0.15) !important;
box-shadow:0 0 18px rgba(57,255,20,0.4), inset 0 0 8px rgba(57,255,20,0.2) !important;
border:1.5px solid rgba(57,255,20,0.7) !important;
}
#joystick-right .nipple .front{
background:rgba(0,220,255,0.15) !important;
box-shadow:0 0 18px rgba(0,220,255,0.4), inset 0 0 8px rgba(0,220,255,0.2) !important;
border:1.5px solid rgba(0,220,255,0.7) !important;
}

/* Custom joy base drawn via SVG overlay */
.joy-base{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
width:140px;height:140px;pointer-events:none;
}
.joy-base circle.outer{fill:none;stroke-width:1;stroke-dasharray:6 4;}
.joy-base circle.inner{fill:none;stroke-width:1;}
.joy-base line{stroke-width:1;}
.joy-label{
position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);
font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;
pointer-events:none;white-space:nowrap;
}
#joystick-left .joy-label{color:rgba(57,255,20,.5);}
#joystick-right .joy-label{color:rgba(0,220,255,.5);}

/* corner brackets */
.joy-corner{position:absolute;width:14px;height:14px;pointer-events:none;}
.joy-corner::before,.joy-corner::after{content:'';position:absolute;background:transparent;}
.joy-tl{top:0;left:0;border-top:2px solid;border-left:2px solid;}
.joy-tr{top:0;right:0;border-top:2px solid;border-right:2px solid;}
.joy-bl{bottom:0;left:0;border-bottom:2px solid;border-left:2px solid;}
.joy-br{bottom:0;right:0;border-bottom:2px solid;border-right:2px solid;}
#joystick-left .joy-corner{border-color:rgba(57,255,20,0.6);}
#joystick-right .joy-corner{border-color:rgba(0,220,255,0.6);}

/* axis tick marks */
.joy-axis-x,.joy-axis-y{position:absolute;pointer-events:none;}
.joy-axis-x{top:50%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(57,255,20,.18) 20%,rgba(57,255,20,.18) 80%,transparent);}
.joy-axis-y{left:50%;top:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,rgba(57,255,20,.18) 20%,rgba(57,255,20,.18) 80%,transparent);}
#joystick-right .joy-axis-x{background:linear-gradient(90deg,transparent,rgba(0,220,255,.18) 20%,rgba(0,220,255,.18) 80%,transparent);}
#joystick-right .joy-axis-y{background:linear-gradient(180deg,transparent,rgba(0,220,255,.18) 20%,rgba(0,220,255,.18) 80%,transparent);}

/* ── CHUNK INDICATOR ── */
#chunk-ind{position:fixed;top:152px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(57,255,20,.45);letter-spacing:2px;pointer-events:none;z-index:62;opacity:0;transition:opacity .5s;}
#chunk-ind.show{opacity:1;}

/* ── STATIC / RESTART ── */
#static-noise{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;display:none;z-index:900;animation:sf .06s infinite;}
@keyframes sf{0%{opacity:.35;filter:brightness(1.5) contrast(2);}50%{opacity:.65;filter:brightness(2.2) contrast(3) hue-rotate(20deg);}100%{opacity:.2;filter:brightness(1) contrast(1.5);}}

#restart-screen{position:fixed;top:0;left:0;width:100%;height:100%;display:none;z-index:1000;background:rgba(0,0,0,.92);align-items:center;justify-content:center;}
.screen-content{text-align:center;font-family:'Orbitron',monospace;padding:50px 60px;border:2px solid #ff1a1a;background:linear-gradient(135deg,rgba(20,0,0,.9),rgba(40,0,0,.7));clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,20px 100%,0 calc(100% - 20px));box-shadow:0 0 40px rgba(255,26,26,.4);}
#res-msg{font-size:38px;color:#ff1a1a;text-shadow:0 0 30px #ff1a1a;font-weight:900;margin-bottom:10px;}
#res-sub{font-size:11px;color:rgba(255,80,80,.7);letter-spacing:4px;margin-bottom:30px;}

/* Button row */
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.screen-content button{background:transparent;border:1px solid #ff1a1a;padding:14px 28px;font-family:'Orbitron',monospace;cursor:pointer;font-size:12px;letter-spacing:3px;transition:all .2s;}
.screen-content button.btn-continue{color:#39ff14;border-color:#39ff14;}
.screen-content button.btn-continue:hover{background:#39ff14;color:#000;box-shadow:0 0 20px #39ff14;}
.screen-content button.btn-restart{color:#ff1a1a;border-color:#ff1a1a;}
.screen-content button.btn-restart:hover{background:#ff1a1a;color:#000;}

.success{border-color:#39ff14!important;background:linear-gradient(135deg,rgba(0,20,0,.9),rgba(0,40,0,.7))!important;}
.success #res-msg{color:#39ff14!important;text-shadow:0 0 30px #39ff14!important;}
.success button.btn-continue{color:#39ff14!important;border-color:#39ff14!important;}
.success button.btn-continue:hover{background:#39ff14!important;color:#000!important;}
.success button.btn-restart{color:rgba(57,255,20,.4)!important;border-color:rgba(57,255,20,.25)!important;}

/* ── START / LOADING ── */
#start-prompt{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.97);z-index:2000;display:flex;justify-content:center;align-items:center;}
.start-box{text-align:center;padding:50px 60px;border:2px solid rgba(57,255,20,.6);background:linear-gradient(135deg,rgba(0,15,0,.9),rgba(0,30,0,.6));clip-path:polygon(0 0,calc(100% - 25px) 0,100% 25px,100% 100%,25px 100%,0 calc(100% - 25px));box-shadow:0 0 60px rgba(57,255,20,.3);max-width:480px;width:90%;}
.start-title{font-family:'Orbitron',monospace;font-size:42px;font-weight:900;color:#39ff14;text-shadow:0 0 30px #39ff14,0 0 60px #00ff00;letter-spacing:6px;margin-bottom:6px;}
.start-sub{font-family:'Share Tech Mono',monospace;color:rgba(57,255,20,.5);font-size:10px;letter-spacing:3px;margin-bottom:28px;}
.start-btn{background:transparent;color:#39ff14;border:1px solid #39ff14;padding:14px 36px;font-family:'Orbitron',monospace;cursor:pointer;font-size:13px;letter-spacing:5px;font-weight:700;transition:all .3s;margin:6px;}
.start-btn:hover{background:#39ff14;color:#000;box-shadow:0 0 30px #39ff14;}
.start-btn.sec{border-color:rgba(57,255,20,.4);color:rgba(57,255,20,.5);font-size:11px;}
.start-btn.sec:hover{background:rgba(57,255,20,.2);color:#39ff14;}
.start-specs{margin-top:24px;font-size:9px;color:rgba(57,255,20,.3);letter-spacing:2px;line-height:2.2;}
#loading-bar-wrap{margin-top:20px;width:100%;height:4px;background:rgba(57,255,20,.15);border-radius:2px;display:none;}
#loading-bar{height:100%;background:#39ff14;box-shadow:0 0 8px #39ff14;width:0%;transition:width .3s;}
#loading-text{margin-top:10px;font-size:9px;color:rgba(57,255,20,.5);letter-spacing:2px;display:none;}
#coords-input-wrap{margin-top:16px;display:none;}
#coords-input-wrap input{background:transparent;border:1px solid rgba(57,255,20,.4);color:#39ff14;font-family:'Share Tech Mono',monospace;font-size:11px;padding:8px 12px;width:100%;letter-spacing:1px;outline:none;text-align:center;}
#coords-input-wrap input::placeholder{color:rgba(57,255,20,.3);}
#coords-input-wrap input:focus{border-color:#39ff14;}
#osm-credit{position:fixed;bottom:5px;right:7px;font-size:8px;color:rgba(57,255,20,.3);pointer-events:none;z-index:60;}
</style>

</head>
<body>

<div id="start-prompt">
  <div class="start-box">
    <div class="start-title">myFPV</div>
    <div class="start-sub">симулятор fpv-дрона</div>
    <button class="start-btn" id="btn-geo" onclick="startWithGeo()">моя локация</button><br>
    <button class="start-btn sec" id="btn-manual" onclick="showManualInput()">+ координаты</button>
    <div id="coords-input-wrap">
      <input type="text" id="coords-input" placeholder="50.4501, 30.5234  (Киев)">
      <button class="start-btn" style="margin-top:10px;font-size:11px;padding:10px 28px" onclick="startWithManual()">загрузить</button>
    </div>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    <div id="loading-text">загрузка карты..</div>
    <div class="start-specs">Левый стик: тяга/поворот · Правый стик: движение<br></div>
  </div>
</div>

<div id="scanlines"></div>
<div id="vignette"></div>
<div id="chromatic"></div>
<div id="chunk-ind">▸ загрузка..</div>

<div id="heading-tape">
  <div id="heading-drum"></div>
  <div id="heading-readout">000°</div>
</div>

<div id="map-bar">
  <canvas id="map-canvas"></canvas>
  <div id="map-sweep"></div>
  <div id="map-arrow"></div>
  <div id="map-cross-h"></div>
  <div id="map-cross-v"></div>
</div>

<div id="osd-left">
  <div class="hud-label">приоритет!</div>
  <div class="mission-target" id="obj-type">поиск..</div>
  <div class="mission-dist" id="obj-dist">DST: ---</div>
  <div id="god-status">⬡ Pycopi3</div>
</div>

<div id="alt-tape">
  <div id="alt-border"></div>
  <div class="tape-tick"><div class="tick-line" style="width:14px"></div><span class="tick-num" id="alt-t2">--</span></div>
  <div style="height:8px"></div>
  <div id="alt-big">0</div><div id="alt-unit">метры</div>
  <div style="height:8px"></div>
  <div class="tape-tick"><div class="tick-line" style="width:9px"></div><span class="tick-num" id="alt-t1">--</span></div>
</div>

<div id="spd-tape">
  <div id="spd-border"></div>
  <div style="display:flex;align-items:center;padding-left:4px;gap:3px;width:100%">
    <span class="tick-num-c" id="spd-t2">--</span><div class="tick-line-c" style="width:14px"></div>
  </div>
  <div style="height:8px"></div>
  <div id="spd-big">0</div><div id="spd-unit">км/ч</div>
  <div style="height:8px"></div>
  <div style="display:flex;align-items:center;padding-left:4px;gap:3px;width:100%">
    <span class="tick-num-c" id="spd-t1">--</span><div class="tick-line-c" style="width:9px"></div>
  </div>
</div>

<div id="target-ui">
  <div id="target-inner">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="target-label">заблок.</div>
    <div id="target-dist">0m</div>
  </div>
</div>

<div id="crosshair">
  <div class="ch-h left"></div><div class="ch-h right"></div>
  <div class="ch-v top"></div><div class="ch-v bottom"></div>

async function loadMap(lat,lon){

const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function bar(p,t){document.getElementById('loading-bar').style.width=p+'%';document.getElementById('loading-text').textContent=t;}

async function fetchOSM(lat,lon,r,retries=10){
  const dLat=r/M_PER_LAT,dLon=r/mPerLon;
  const S=lat-dLat,N=lat+dLat,W=lon-dLon,E=lon+dLon;
  const q=`[out:json][timeout:25][bbox:${S},${W},${N},${E}];(way["building"];way["highway"~"^(primary|secondary|tertiary|residential|service|unclassified)$"];way["waterway"];way["leisure"="park"];);out geom;`;
  const MIRRORS=[
    'https://overpass-api.de/api/interpreter',
    'https://overpass.kumi.systems/api/interpreter',
    'https://maps.mail.ru/osm/tools/overpass/api/interpreter'
  ];
  for(let i=0;i<retries;i++){
    const url=MIRRORS[i%MIRRORS.length];
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),18000); // 18s hard timeout per attempt
    try{
      const resp=await fetch(url,{method:'POST',body:'data='+encodeURIComponent(q),signal:ctrl.signal});
      clearTimeout(tid);
      if(resp.ok){
        const json=await resp.json();
        if(json&&Array.isArray(json.elements))return json;
        // Empty but valid response -- return it
        return json;
      }
      // Rate limited (429) -- wait longer
      if(resp.status===429)await sleep(3000+i*500);
    }catch(err){
      clearTimeout(tid);
      if(err.name==='AbortError')console.warn(`OSM attempt ${i+1} timed out`);
      else console.warn(`OSM attempt ${i+1} failed:`,err.message);
    }
    await sleep(600+i*200);
  }
  throw new Error('OSM: all retries exhausted');
}

function zoneKey(la,lo){return`${(la*250|0)}_${(lo*250|0)}`;}
function markZone(la,lo){loadedZones.add(zoneKey(la,lo));}
async function checkZone(){
  if(chunkBusy||gameOver)return;
  if(drone.pos.distanceTo(lastChunk)<CHUNK_TRIG)return;
  const cLat=oLat+(-drone.pos.z/M_PER_LAT),cLon=oLon+(drone.pos.x/mPerLon);
  const key=zoneKey(cLat,cLon);
  if(loadedZones.has(key))return;
  // Pre-mark to prevent double-fetch on fast movement
  loadedZones.add(key);
  chunkBusy=true;lastChunk.copy(drone.pos);
  const ci=document.getElementById('chunk-ind');ci.classList.add('show');
  try{
    const d=await fetchOSM(cLat,cLon,CHUNK_R,4);
    if(d)await buildScene(d);
    spawnAround(drone.pos.x,drone.pos.z);
  }catch(e){
    console.warn('zone fail',e);
    // Remove key so it can retry next time
    loadedZones.delete(key);
  }
  chunkBusy=false;
  setTimeout(()=>ci.classList.remove('show'),700);
}

function g2l(lat,lon){return{x:(lon-oLon)*mPerLon,z:-(lat-oLat)*M_PER_LAT};}
function triPoly(pts){
  const v=[];if(pts.length<3)return v;const p0=pts[0];
  for(let i=1;i<pts.length-1;i++)v.push(p0.x,0,p0.z,pts[i].x,0,pts[i].z,pts[i+1].x,0,pts[i+1].z);
  return v;
}

async function buildScene(data){
  for(const el of data.elements||[]){
    if(el.type!=='way'||!el.geometry)continue;
    const tags=el.tags||{},pts=el.geometry.map(g=>g2l(g.lat,g.lon));
    if(pts.length<2)continue;
    if(tags.building){
      const lv=parseInt(tags['building:levels']||'3'),ht=parseFloat(tags.height||'0');
      const h=ht>0?ht:lv*3.2+1;
      const poly=[...pts];
      if(poly[0].x!==poly[poly.length-1].x||poly[0].z!==poly[poly.length-1].z)poly.push(poly[0]);
      spawnBuilding(poly,h);bldgTotal++;
    }else if(tags.highway){
      const isPri=tags.highway==='primary'||tags.highway==='secondary';
      const col=isPri?0x00cc55:tags.highway==='tertiary'?0x008833:0x004422;
      const lp=pts.map(p=>new THREE.Vector3(p.x,0.18,p.z));
      if(lp.length>=2)scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(lp),new THREE.LineBasicMaterial({color:col,transparent:true,opacity:.55})));
      if(tags.highway!=='footway'&&tags.highway!=='path'&&pts.length>=2)roads.push({pts:[...pts],isPri});
    }else if(tags.waterway||tags.natural==='water'){
      const lp=pts.map(p=>new THREE.Vector3(p.x,0.08,p.z));
      if(lp.length>=2)scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(lp),new THREE.LineBasicMaterial({color:0x0099bb,transparent:true,opacity:.6})));
    }else if(tags.leisure==='park'&&pts.length>=3){
      const poly=[...pts];
      if(poly[0].x!==poly[poly.length-1].x||poly[0].z!==poly[poly.length-1].z)poly.push(poly[0]);
      const v=triPoly(poly);
      if(v.length>=9){
        const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
        scene.add(new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:0x002800,transparent:true,opacity:.4,side:THREE.DoubleSide})));
        scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts.map(p=>new THREE.Vector3(p.x,.12,p.z))),new THREE.LineBasicMaterial({color:0x00bb33,transparent:true,opacity:.5})));
      }
    }
  }
  spawnCarsOnRoads();
}

function spawnBuilding(pts,h){
  if(pts.length<3)return;
  const grp=new THREE.Group();
  const wm=new THREE.MeshBasicMaterial({color:0x002200,transparent:true,opacity:.6,side:THREE.DoubleSide});
  const em=new THREE.LineBasicMaterial({color:0x00ff66,transparent:true,opacity:.88});
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i],b=pts[i+1];
    const wv=new Float32Array([a.x,0,a.z,b.x,0,b.z,b.x,h,b.z,a.x,0,a.z,b.x,h,b.z,a.x,h,a.z]);
    const wg=new THREE.BufferGeometry();wg.setAttribute('position',new THREE.Float32BufferAttribute(wv,3));
    grp.add(new THREE.Mesh(wg,wm));
    grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(a.x,0,a.z),new THREE.Vector3(a.x,h,a.z),new THREE.Vector3(b.x,h,b.z),new THREE.Vector3(b.x,0,b.z)]),em));
  }
  grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts.map(p=>new THREE.Vector3(p.x,h,p.z))),new THREE.LineBasicMaterial({color:0x44ffaa,transparent:true,opacity:.7})));
  grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts.map(p=>new THREE.Vector3(p.x,.1,p.z))),new THREE.LineBasicMaterial({color:0x226622,transparent:true,opacity:.4})));
  const tv=triPoly(pts);
  if(tv.length>=9){
    const topV=[];for(let i=0;i<tv.length;i+=3)topV.push(tv[i],h,tv[i+2]);
    const tg=new THREE.BufferGeometry();tg.setAttribute('position',new THREE.Float32BufferAttribute(topV,3));
    grp.add(new THREE.Mesh(tg,new THREE.MeshBasicMaterial({color:0x001800,transparent:true,opacity:.7,side:THREE.DoubleSide})));
  }
  const vm=new THREE.LineBasicMaterial({color:0x44ffaa,transparent:true,opacity:.6});
  pts.slice(0,pts.length-1).forEach(p=>grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(p.x,0,p.z),new THREE.Vector3(p.x,h,p.z)]),vm)));
  scene.add(grp);
  let minX=Infinity,maxX=-Infinity,minZ=Infinity,maxZ=-Infinity;
  pts.forEach(p=>{if(p.x<minX)minX=p.x;if(p.x>maxX)maxX=p.x;if(p.z<minZ)minZ=p.z;if(p.z>maxZ)maxZ=p.z;});
  buildings.push({cx:(minX+maxX)/2,cz:(minZ+maxZ)/2,hw:(maxX-minX)/2+.4,hd:(maxZ-minZ)/2+.4,height:h,pts});
}

function buildCarMesh(col){
  const grp=new THREE.Group(),mat=new THREE.MeshBasicMaterial({color:col,wireframe:true});
  grp.add(new THREE.Mesh(new THREE.BoxGeometry(2,.85,4),mat));
  const cab=new THREE.Mesh(new THREE.BoxGeometry(1.6,.65,2),mat);cab.position.set(0,.72,-.3);grp.add(cab);
  const wm=new THREE.MeshBasicMaterial({color:0x222200,wireframe:true});
  [[-1.05,-.42,1.3],[1.05,-.42,1.3],[-1.05,-.42,-1.3],[1.05,-.42,-1.3]].forEach(p=>{
    const w=new THREE.Mesh(new THREE.CylinderGeometry(.4,.4,.25,7),wm);w.rotation.z=Math.PI/2;w.position.set(...p);grp.add(w);
  });
  const lm=new THREE.MeshBasicMaterial({color:0xffffcc,transparent:true,opacity:.85});
  [[-0.6,0,2.05],[0.6,0,2.05]].forEach(p=>{const l=new THREE.Mesh(new THREE.BoxGeometry(.2,.16,.07),lm);l.position.set(...p);grp.add(l);});
  return grp;
}

function spawnCarsOnRoads(){
  for(let si=0;si<roads.length&&cars.length<200;si++){
    if(roadsWithCars.has(si))continue;
    const seg=roads[si];if(seg.pts.length<2)continue;
    // increased car spawn count
    const num=seg.isPri?Math.floor(Math.random()*5)+2:(Math.random()<.7?Math.floor(Math.random()*3)+1:0);
    for(let c=0;c<num;c++){
      const idx=Math.floor(Math.random()*(seg.pts.length-1));
      const p=seg.pts[idx];
      const col=Math.random()<.35?0xff6600:Math.random()<.5?0x0088ff:0xffcc00;
      const mesh=buildCarMesh(col);mesh.position.set(p.x,.42,p.z);scene.add(mesh);
      cars.push({mesh,segIdx:si,wpIdx:idx,speed:(seg.isPri?14:9)+Math.random()*8,progress:0,isStopped:false,stopTimer:0,lane:(Math.random()-.5)*.6});
    }
    roadsWithCars.add(si);
  }
}
function updateCars(dt){
  for(let i=cars.length-1;i>=0;i--){
    const c=cars[i],seg=roads[c.segIdx];
    if(!seg){scene.remove(c.mesh);cars.splice(i,1);continue;}
    if(c.isStopped){c.stopTimer-=dt;if(c.stopTimer<=0)c.isStopped=false;continue;}
    if(Math.random()<.003){c.isStopped=true;c.stopTimer=1+Math.random()*3;continue;}
    const pts=seg.pts,a=pts[c.wpIdx],b=pts[c.wpIdx+1];
    if(!a||!b){c.wpIdx=0;continue;}
    const sl=Math.sqrt((b.x-a.x)**2+(b.z-a.z)**2);
    if(sl<.1){c.wpIdx++;if(c.wpIdx>=pts.length-1)c.wpIdx=0;continue;}
    c.progress+=c.speed*dt/sl;
    if(c.progress>=1){c.progress=0;c.wpIdx++;if(c.wpIdx>=pts.length-1){c.segIdx=Math.floor(Math.random()*roads.length);c.wpIdx=0;}}
    const aa=pts[c.wpIdx]||pts[0],bb=pts[Math.min(c.wpIdx+1,pts.length-1)]||pts[0];
    const px=aa.x+(bb.x-aa.x)*c.progress,pz=aa.z+(bb.z-aa.z)*c.progress;
    const dx=bb.x-aa.x,dz=bb.z-aa.z,len=Math.sqrt(dx*dx+dz*dz)||1;
    const nx=-dz/len,nz=dx/len;
    let ox=0,oz=0;
    for(const b2 of buildings){
      const bdx=px-b2.cx,bdz=pz-b2.cz,bd=Math.sqrt(bdx*bdx+bdz*bdz);
      const md=Math.max(b2.hw,b2.hd)+3;
      if(bd<md&&bd>0){const f=(md-bd)/md*3;ox+=bdx/bd*f;oz+=bdz/bd*f;}
    }
    c.mesh.position.set(px+nx*c.lane+ox,.42,pz+nz*c.lane+oz);
    c.mesh.rotation.set(0,Math.atan2(dx,dz),0);
  }
}

function spawnTank(x,z){
  const grp=new THREE.Group(),mat=new THREE.MeshBasicMaterial({color:0xff2200,wireframe:true});
  grp.add(new THREE.Mesh(new THREE.BoxGeometry(5,1.5,8),mat));
  const t=new THREE.Mesh(new THREE.BoxGeometry(3,1,4),mat);t.position.y=1.2;grp.add(t);
  const b=new THREE.Mesh(new THREE.CylinderGeometry(.15,.15,3,6),mat);b.position.set(0,1.8,2.5);b.rotation.x=Math.PI/2;grp.add(b);
  const gl=new THREE.Mesh(new THREE.SphereGeometry(.5,6,6),new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:.55}));gl.position.y=2;grp.add(gl);

function wander(en,dt){
  en._wt=(en._wt||0)-dt;
  if(en._wt<=0){
    const a=Math.random()*Math.PI*2;
    en._wdir=new THREE.Vector3(Math.cos(a),0,Math.sin(a));
    en._wt=5+Math.random()*10;
  }
  if(en._wdir)en.dir.lerp(en._wdir,.025).normalize();
}
function steerBuildings(en){
  const ar=en.type==='tank'?22:10;
  for(const b of buildings){
    const dx=en.mesh.position.x-b.cx,dz=en.mesh.position.z-b.cz;
    const dist=Math.sqrt(dx*dx+dz*dz),combined=ar+Math.max(b.hw,b.hd);
    if(dist<combined){en.dir.lerp(new THREE.Vector3(dx,0,dz).normalize(),.12).normalize();}
  }
}
function updateEntities(dt,time){
  entities.forEach(en=>{
    if(en.type==='tank'){
      wander(en,dt);steerBuildings(en);
      en.mesh.position.addScaledVector(en.dir,en.speed*dt);
      en.mesh.position.y=.75;
      en.mesh.lookAt(en.mesh.position.clone().add(new THREE.Vector3(en.dir.x*2,0,en.dir.z*2)));
      if(time>en.lastFire){
        createTracer(en.mesh.position.clone().add(new THREE.Vector3(0,1.5,0)),drone.pos,0xff5500);
        en.lastFire=time+3+Math.random();
      }
    }else if(en.type==='soldier'){
      wander(en,dt);steerBuildings(en);
      en.mesh.position.addScaledVector(en.dir,en.speed*dt);
      en.mesh.position.y=.9;
      en.mesh.lookAt(en.mesh.position.clone().add(new THREE.Vector3(en.dir.x*2,0,en.dir.z*2)));
      if(time>en.lastFire&&drone.pos.distanceTo(en.mesh.position)<200){
        createTracer(en.mesh.position.clone().add(new THREE.Vector3(0,1,0)),drone.pos,0xffaa00);
        en.lastFire=time+1+Math.random()*2;
      }
    }else if(en.type==='uav'||en.type==='wing'){
      if(en.waypoints.length>0){
        const wp=en.waypoints[en.wpIdx],toWp=wp.clone().sub(en.mesh.position);
        const thresh=en.type==='wing'?30:12;
        if(toWp.length()<thresh)en.wpIdx=(en.wpIdx+1)%en.waypoints.length;
        else en.dir.lerp(toWp.normalize(),en.type==='wing'?.015:.04).normalize();
      }
      en.mesh.position.addScaledVector(en.dir,en.speed*dt);
      en.mesh.lookAt(en.mesh.position.clone().add(en.dir));
      if(en.type==='uav'&&en.props)en.props.forEach((p,i)=>p.rotation.z+=(i%2===0?1:-1)*dt*14);
      if(time>en.lastFire&&drone.pos.distanceTo(en.mesh.position)<280){
        createTracer(en.mesh.position.clone(),drone.pos,en.type==='wing'?0xff0000:0xff3300);
        en.lastFire=time+(en.type==='wing'?2.5:1.5)+Math.random()*2;
      }
    }
  });
}

function updateSeeker(){

        dist:drone.pos.distanceTo(missionTarget.mesh.position),type:missionTarget.type};
    }

    const dist=drone.pos.distanceTo(en.mesh.position);

        minD=dist;best={x:(p.x*.5+.5)*innerWidth,y:(p.y*-.5+.5)*innerHeight,type:en.type,dist};

  });

  }else ui.style.display='none';

// ── TRAIL: gradient ribbon that fades with distance ──
function initTrail(){
  // Use a LineSegments approach with vertex colors for per-point opacity
  trailLineGeo=new THREE.BufferGeometry();
  const maxSegs=trailMax-1;
  const positions=new Float32Array(trailMax*3);
  const colors=new Float32Array(trailMax*3);
  trailLineGeo.setAttribute('position',new THREE.BufferAttribute(positions,3));
  trailLineGeo.setAttribute('color',new THREE.BufferAttribute(colors,3));
  trailLineGeo.setDrawRange(0,0);
  trailLine=new THREE.Line(trailLineGeo,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:.9,linewidth:1}));
  scene.add(trailLine);
  lastTrailPos.copy(drone.pos);
}

function updateTrail(){
  // Add point if moved enough
  if(drone.pos.distanceTo(lastTrailPos)>=TRAIL_SEGMENT_LEN){
    trailPts.push(drone.pos.clone());
    lastTrailPos.copy(drone.pos);
    if(trailPts.length>trailMax)trailPts.shift();
  }

  if(trailPts.length<2)return;

  // Compute cumulative distances from the front (newest point)
  const n=trailPts.length;
  const dists=new Float32Array(n);
  dists[n-1]=0;
  for(let i=n-2;i>=0;i--){
    dists[i]=dists[i+1]+trailPts[i].distanceTo(trailPts[i+1]);
  }
  const totalDist=dists[0];

  const posArr=trailLineGeo.attributes.position.array;
  const colArr=trailLineGeo.attributes.color.array;

  for(let i=0;i<n;i++){
    const p=trailPts[i];
    posArr[i*3]=p.x;posArr[i*3+1]=p.y;posArr[i*3+2]=p.z;
    // Distance from newest point
    const distFromHead=dists[i];
    // Fade: full green at head, fading to black at TRAIL_MAX_DIST
    const t=Math.max(0,1-distFromHead/TRAIL_MAX_DIST);
    // Color: #39ff14 (57,255,20) fading out
    colArr[i*3]=0.22*t;
    colArr[i*3+1]=1.0*t;
    colArr[i*3+2]=0.08*t;
  }

  trailLineGeo.attributes.position.needsUpdate=true;
  trailLineGeo.attributes.color.needsUpdate=true;
  trailLineGeo.setDrawRange(0,n);
}

function updateMap(){
  mapX.clearRect(0,0,MAP_W,MAP_H);

  mapX.fillStyle='rgba(0,7,0,.55)';mapX.fillRect(0,0,MAP_W,MAP_H);
  mapX.strokeStyle='rgba(57,255,20,.05)';mapX.lineWidth=.5;
  for(let x=0;x<MAP_W;x+=30){mapX.beginPath();mapX.moveTo(x,0);mapX.lineTo(x,MAP_H);mapX.stroke();}
  for(let y=0;y<MAP_H;y+=20){mapX.beginPath();mapX.moveTo(0,y);mapX.lineTo(MAP_W,y);mapX.stroke();}
  roads.forEach(seg=>{
    if(seg.pts.length<2)return;
    mapX.beginPath();mapX.strokeStyle=seg.isPri?'rgba(0,200,60,.5)':'rgba(0,100,40,.3)';mapX.lineWidth=seg.isPri?1.5:.7;
    seg.pts.forEach((p,i)=>{const dx=(p.x-drone.pos.x)*sc,dz=(p.z-drone.pos.z)*sc;i===0?mapX.moveTo(cx+dx,cy+dz):mapX.lineTo(cx+dx,cy+dz);});
    mapX.stroke();
  });
  buildings.forEach(b=>{
    const dx=(b.cx-drone.pos.x)*sc,dz=(b.cz-drone.pos.z)*sc;
    if(Math.abs(dx)<MAP_W/2+10&&Math.abs(dz)<MAP_H/2+5){mapX.fillStyle='rgba(0,200,0,.22)';mapX.fillRect(cx+dx-b.hw*sc,cy+dz-b.hd*sc,b.hw*sc*2,b.hd*sc*2);}
  });
  cars.forEach(c=>{
    const dx=(c.mesh.position.x-drone.pos.x)*sc,dz=(c.mesh.position.z-drone.pos.z)*sc;
    if(Math.abs(dx)<MAP_W/2&&Math.abs(dz)<MAP_H/2){
      mapX.fillStyle='#ffaa00';mapX.shadowColor='#ffaa00';mapX.shadowBlur=2;
      mapX.fillRect(cx+dx-1.5,cy+dz-1.5,3,3);mapX.shadowBlur=0;
    }
  });
  entities.forEach(en=>{
    const dx=(en.mesh.position.x-drone.pos.x)*sc,dz=(en.mesh.position.z-drone.pos.z)*sc;
    const isPri=en===missionTarget;
    if(Math.abs(dx)<MAP_W/2&&Math.abs(dz)<MAP_H/2){
      const col=isPri?'#ffff00':en.type==='uav'||en.type==='wing'?'#ff44ff':'#ff3333';
      mapX.fillStyle=col;mapX.shadowColor=col;mapX.shadowBlur=isPri?7:3;
      const sz=isPri?6:en.type==='uav'||en.type==='wing'?4:2.5;
      mapX.fillRect(cx+dx-sz/2,cy+dz-sz/2,sz,sz);mapX.shadowBlur=0;
    }else if(isPri){
      const ang=Math.atan2(dz,dx);
      const ex=Math.min(Math.max(cx+Math.cos(ang)*(MAP_W/2-8),8),MAP_W-8);
      const ez=Math.min(Math.max(cy+Math.sin(ang)*(MAP_H/2-6),5),MAP_H-5);
      mapX.save();mapX.translate(ex,ez);mapX.rotate(ang+Math.PI/2);
      mapX.fillStyle='rgba(255,255,0,.9)';mapX.beginPath();mapX.moveTo(0,-5);mapX.lineTo(3.5,3);mapX.lineTo(-3.5,3);mapX.closePath();mapX.fill();
      mapX.restore();
    }
  });
  mapX.fillStyle='#39ff14';mapX.shadowColor='#39ff14';mapX.shadowBlur=5;
  mapX.beginPath();mapX.arc(cx,cy,3.5,0,Math.PI*2);mapX.fill();mapX.shadowBlur=0;
  document.getElementById('map-arrow').style.transform=`translate(-50%,-50%) rotate(${-drone.rotY}rad)`;
}

let actx,dOsc,dOsc2,dGain;
// AudioContext created lazily on first user interaction to avoid browser autoplay block
function ensureAudio(){
  if(actx){
    // Resume if browser suspended it (common on mobile)
    if(actx.state==='suspended')actx.resume();
    return;
  }
  try{
    actx=new(window.AudioContext||window.webkitAudioContext)();
    dOsc=actx.createOscillator();dOsc2=actx.createOscillator();
    dOsc.type=dOsc2.type='sawtooth';dOsc2.detune.value=9;
    dGain=actx.createGain();dGain.gain.value=.038;
    const lpf=actx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=1100;lpf.Q.value=.9;
    const hpf=actx.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=50;
    const comp=actx.createDynamicsCompressor();comp.threshold.value=-20;comp.ratio.value=4;
    dOsc.connect(lpf);dOsc2.connect(lpf);lpf.connect(hpf);hpf.connect(comp);comp.connect(dGain);dGain.connect(actx.destination);
    dOsc.start();dOsc2.start();
  }catch(e){console.warn('Audio init failed:',e);}
}
function initAudio(){
  // Called at game start -- we don't create AudioContext here anymore,
  // just hook it to the first joystick/touch event so it's ready
  const resume=()=>{ensureAudio();};
  document.addEventListener('touchstart',resume,{once:true,passive:true});
  document.addEventListener('mousedown',resume,{once:true});
}
function playGunshot(vol=.06){
  ensureAudio();
  if(!actx||actx.state!=='running')return;
  const t=actx.currentTime;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='square';o.frequency.setValueAtTime(240+Math.random()*100,t);o.frequency.exponentialRampToValueAtTime(35,t+.1);
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+.13);
  o.connect(g);g.connect(actx.destination);o.start(t);o.stop(t+.14);
  const fr=Math.floor(actx.sampleRate*.09),buf=actx.createBuffer(1,fr,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<fr;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/fr,1.8);
  const src=actx.createBufferSource(),gn=actx.createGain(),bpf=actx.createBiquadFilter();
  bpf.type='bandpass';bpf.frequency.value=900;bpf.Q.value=.6;
  gn.gain.setValueAtTime(vol*.6,t);gn.gain.exponentialRampToValueAtTime(.001,t+.1);
  src.buffer=buf;src.connect(bpf);bpf.connect(gn);gn.connect(actx.destination);src.start(t);src.stop(t+.1);
}
function playExplosion(big=false){
  ensureAudio();
  if(!actx||actx.state!=='running')return;
  const t=actx.currentTime,vol=big?.7:.45;
  const o=actx.createOscillator(),gt=actx.createGain();o.type='sine';
  o.frequency.setValueAtTime(65,t);o.frequency.exponentialRampToValueAtTime(18,t+.4);
  gt.gain.setValueAtTime(vol,t);gt.gain.exponentialRampToValueAtTime(.001,t+.42);
  o.connect(gt);gt.connect(actx.destination);o.start(t);o.stop(t+.44);
  const dur=big?2.5:1.2,fr=Math.floor(actx.sampleRate*dur),buf=actx.createBuffer(1,fr,actx.sampleRate),dd=buf.getChannelData(0);
  for(let i=0;i<fr;i++)dd[i]=(Math.random()*2-1)*Math.pow(1-i/fr,big?1.2:1.8);
  const src=actx.createBufferSource(),lpf=actx.createBiquadFilter(),gn=actx.createGain();
  lpf.type='lowpass';lpf.frequency.value=big?700:450;
  gn.gain.setValueAtTime(vol*.8,t);gn.gain.exponentialRampToValueAtTime(.001,t+dur);
  src.buffer=buf;src.connect(lpf);lpf.connect(gn);gn.connect(actx.destination);src.start(t);src.stop(t+dur);
}

function initProxCanvas(){
  const c=document.getElementById('prox-noise-canvas');
  if(c){c.width=innerWidth;c.height=innerHeight;proxCtx=c.getContext('2d');}
}
function updateProxNoise(){
  const px=drone.pos.x,py=drone.pos.y,pz=drone.pos.z;
  let closest=999;
  for(const b of buildings){
    if(Math.abs(px-b.cx)>b.hw+12||Math.abs(pz-b.cz)>b.hd+12)continue;
    if(py<0||py>b.height+2)continue;
    const dx=Math.max(0,Math.abs(px-b.cx)-b.hw),dz=Math.max(0,Math.abs(pz-b.cz)-b.hd);
    const dy=Math.max(0,py<b.height?0:py-b.height);
    const d=Math.sqrt(dx*dx+dy*dy+dz*dz);if(d<closest)closest=d;
  }
  if(py<closest)closest=py;
  for(const en of entities){const d=drone.pos.distanceTo(en.mesh.position)-en.radius;if(d<closest)closest=d;}
  const PROX_START=10,PROX_FULL=2;
  if(closest>PROX_START)proxI=Math.max(0,proxI-.05);
  else{const t2=1-Math.max(0,(closest-PROX_FULL)/(PROX_START-PROX_FULL));proxI=Math.min(1,proxI+t2*.15);}
  const pn=document.getElementById('prox-noise'),pg=document.getElementById('prox-glitch'),pb=document.getElementById('prox-border');
  if(proxI<.02){pn.style.opacity='0';if(pg)pg.classList.remove('on');if(pb)pb.style.opacity='0';return;}
  if(proxCtx){
    const W=proxCtx.canvas.width,H=proxCtx.canvas.height,img=proxCtx.createImageData(W,H),d=img.data;
    for(let i=0;i<d.length;i+=4){const v=Math.random()<proxI?(Math.random()*255)|0:0;d[i]=d[i+1]=d[i+2]=v;d[i+3]=v>0?(proxI*160)|0:0;}
    proxCtx.putImageData(img,0,0);pn.style.opacity=String(Math.min(.5,proxI*.55));
  }
  if(pg){if(proxI>.3)pg.classList.add('on');else pg.classList.remove('on');}
  if(pb){const a=proxI*.8;pb.style.opacity=String(a);pb.style.border=`${Math.ceil(proxI*4)}px solid rgba(255,20,20,${a})`;pb.style.boxShadow=`inset 0 0 ${proxI*60}px rgba(255,0,0,${a*.4})`;}
  if(proxI>.4)document.getElementById('chromatic').classList.add('active');
}

function endGame(msg='Крэш',success=false){
  if(gameOver)return;gameOver=true;
  createExplosion(drone.pos.clone(),success?0xffff00:0xff2200,success?70:50,true);
  document.getElementById('static-noise').style.display='block';
  document.getElementById('chromatic').classList.add('active');
  setTimeout(()=>{
    const rs=document.getElementById('restart-screen');
    rs.style.display='flex';
    const box=document.getElementById('screen-box');
    if(success){
      box.className='screen-content success';
      el('res-msg').textContent='ВЬЕБАЛ!';
      el('res-sub').textContent='ЦЕЛЬ УНИЧТОЖЕНА!';
    }else{
      box.className='screen-content';
      el('res-msg').textContent='КРЭШ!';
      el('res-sub').textContent=msg;
    }
  },1300);
}

// ── CONTINUE: resume flight from current position ──
function continueGame(){
  gameOver=false;
  // Reset drone state
  drone.vel.set(0,0,0);
  drone.pos.y=Math.max(drone.pos.y,30); // lift up a bit
  drone.tiltX=0;drone.tiltZ=0;
  // Hide UI
  document.getElementById('restart-screen').style.display='none';
  document.getElementById('static-noise').style.display='none';
  document.getElementById('chromatic').classList.remove('active');
  document.getElementById('prox-border').style.opacity='0';
  document.getElementById('prox-glitch').classList.remove('on');
  // Respawn some enemies around player
  spawnAround(drone.pos.x,drone.pos.z);
  // Resume loop
  clock.getDelta(); // eat elapsed time
  animate();
}

function pip2D(px,pz,pts){
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i].x,zi=pts[i].z,xj=pts[j].x,zj=pts[j].z;
    if(((zi>pz)!==(zj>pz))&&(px<(xj-xi)*(pz-zi)/(zj-zi)+xi))inside=!inside;
  }
  return inside;
}

let input={left:{x:0,y:0},right:{x:0,y:0}};
function setupJoysticks(){
  const jL=nipplejs.create({zone:document.getElementById('joystick-left'),mode:'static',position:{left:'75px',bottom:'75px'},color:'#39ff14',size:130,fadeTime:100});
  jL.on('move',(e,d)=>input.left=d.vector||{x:0,y:0});
  jL.on('end hidden pressure',()=>input.left={x:0,y:0});

  const jR=nipplejs.create({zone:document.getElementById('joystick-right'),mode:'static',position:{right:'75px',bottom:'75px'},color:'#00dcff',size:130,fadeTime:100});
  jR.on('move',(e,d)=>input.right=d.vector||{x:0,y:0});
  jR.on('end hidden pressure',()=>input.right={x:0,y:0});
}

const PX_DEG=2.2,DRUM_HALF=150;
function buildDrum(){
  const drum=document.getElementById('heading-drum');
  if(!drum)return;
  let html='';
  for(let rep=0;rep<2;rep++){
    for(let d=0;d<360;d+=5){
      const isMajor=d%45===0,isMed=d%15===0&&!isMajor;
      const label=isMajor?['N','NE','E','SE','S','SW','W','NW'][d/45]:isMed?(d+'°'):'';
      html+=`<div class="hdg-tick${isMajor?' major':isMed?' minor':''}">`;
      html+=`<span style="font-size:${isMajor?9:7}px">${label}</span>`;
      html+=`<div style="width:1px;height:${isMajor?8:isMed?5:3}px;background:rgba(57,255,20,${isMajor?.7:isMed?.4:.2});margin-top:2px"></div>`;
      html+='</div>';
    }
  }
  drum.innerHTML=html;
}
function updateDrum(hdg){
  const drum=document.getElementById('heading-drum'),ro=document.getElementById('heading-readout');
  if(drum)drum.style.transform=`translateX(${-(hdg*PX_DEG)+DRUM_HALF}px)`;
  if(ro)ro.textContent=hdg.toFixed(0).padStart(3,'0')+'°';
}
function el(id){return document.getElementById(id);}

function animate(){
  if(gameOver){renderer.render(scene,camera);return;}
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.033),time=clock.getElapsedTime();
  updateTrail();updateMap();updateMission();updateSeeker();
  updateCars(dt);updateEntities(dt,time);checkZone();updateProxNoise();
  if(actx&&actx.state==='running'&&dOsc){
    const f=65+drone.vel.length()*3.5;
    dOsc.frequency.setTargetAtTime(f,actx.currentTime,.08);
    dOsc2.frequency.setTargetAtTime(f+9,actx.currentTime,.08);
  }
  props.forEach((p,i)=>p.rotation.y+=(40+(input.left.y+1)*40)*dt*(i%2===0?1:-1));
  drone.rotY-=input.left.x*PHYSICS.rotationSpeed*dt;
  drone.tiltX=THREE.MathUtils.lerp(drone.tiltX,-input.right.y*PHYSICS.tiltMax,.1);
  drone.tiltZ=THREE.MathUtils.lerp(drone.tiltZ,-input.right.x*PHYSICS.tiltMax,.1);
  const mDir=new THREE.Vector3(input.right.x,0,-input.right.y).applyAxisAngle(new THREE.Vector3(0,1,0),drone.rotY);
  drone.vel.addScaledVector(mDir,PHYSICS.acceleration*dt);
  drone.vel.y+=(input.left.y*PHYSICS.lift-9.81)*dt;
  drone.vel.multiplyScalar(PHYSICS.friction);
  drone.pos.addScaledVector(drone.vel,dt);
  if(drone.pos.y<.4){drone.pos.y=.4;drone.vel.y=0;}
  droneGrp.position.copy(drone.pos);
  droneGrp.rotation.set(0,0,0);
  droneGrp.rotateY(drone.rotY);droneGrp.rotateX(drone.tiltX);droneGrp.rotateZ(drone.tiltZ);
  const camOff=new THREE.Vector3(0,2,4.5).applyAxisAngle(new THREE.Vector3(0,1,0),drone.rotY);
  camera.position.lerp(drone.pos.clone().add(camOff),.18);
  camera.lookAt(drone.pos);
  for(let i=tracers.length-1;i>=0;i--){
    const t=tracers[i];t.mesh.position.addScaledVector(t.dir,TRACER_SPEED*dt);
    t.life-=dt;t.mesh.material.opacity=Math.max(0,t.life*.8);
    if(t.life<=0){
      scene.remove(t.mesh);
      t.mesh.geometry.dispose();
      t.mesh.material.dispose();
      tracers.splice(i,1);
    }
  }
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.mesh.position.addScaledVector(p.vel,dt);
    if(p.isRing){p.mesh.scale.addScalar(dt*30);p.mesh.material.opacity=Math.max(0,p.life*1.4);}
    else if(p.isSmoke){p.vel.multiplyScalar(.975);p.mesh.scale.addScalar(dt*2);p.mesh.material.opacity=Math.max(0,p.life*.3);}
    else if(p.isFlash){p.mesh.scale.setScalar(p.mesh.scale.x+dt*22);p.mesh.material.opacity=Math.max(0,p.life*8);}
    else{p.vel.y-=9.81*dt;p.mesh.material.opacity=Math.max(0,p.life*.8);p.mesh.rotation.x+=dt*2.2;p.mesh.rotation.y+=dt*3.1;}
    p.life-=dt;
    if(p.life<=0){
      scene.remove(p.mesh);
      p.mesh.geometry.dispose();
      p.mesh.material.dispose();
      particles.splice(i,1);
    }
  }
  if(drone.pos.y<.4)endGame('Упал на землю');
  // ── COLLISION: buildings ──
  // Use sub-stepped position to avoid tunnelling at low FPS
  const px=drone.pos.x,py=drone.pos.y,pz=drone.pos.z;
  let bldgHit=false;
  for(const b of buildings){
    if(bldgHit)break;
    if(Math.abs(px-b.cx)>b.hw+2||Math.abs(pz-b.cz)>b.hd+2)continue;
    if(py<-1||py>b.height+1)continue;
    if(!b.pts)continue;
    // AABB pre-check (faster than pip2D)
    if(px>b.cx-b.hw&&px<b.cx+b.hw&&pz>b.cz-b.hd&&pz<b.cz+b.hd&&py>=0&&py<=b.height){
      if(pip2D(px,pz,b.pts)){
        // Compute push-out vector from building centre
        const outX=px-b.cx, outZ=pz-b.cz;
        const outLen=Math.sqrt(outX*outX+outZ*outZ)||1;
        // If moving fast (low FPS) just push out; otherwise end game
        const speed2d=Math.sqrt(drone.vel.x**2+drone.vel.z**2);
        if(speed2d>18){
          endGame('Врезался в здание');
          bldgHit=true;
        }else{
          // Soft push-out: nudge drone outside the building
          const pushDist=Math.max(b.hw,b.hd)*1.05;
          drone.pos.x=b.cx+(outX/outLen)*pushDist;
          drone.pos.z=b.cz+(outZ/outLen)*pushDist;
          drone.vel.x*=-0.3;drone.vel.z*=-0.3;
        }
      }
    }
  }
  // ── COLLISION: entities ──
  if(!bldgHit){
    for(const en of entities){
      if(drone.pos.distanceTo(en.mesh.position)<en.radius+.5){
        endGame(en.side==='hostile'?'Сбит противником':'Столкновение',en.side==='hostile');
        break;
      }
    }
  }
  const speed=drone.vel.length()*3.6,altM=drone.pos.y;
  if(el('alt-big'))el('alt-big').textContent=altM.toFixed(0);
  if(el('alt-t1'))el('alt-t1').textContent=Math.max(0,altM-20).toFixed(0);
  if(el('alt-t2'))el('alt-t2').textContent=(altM+20).toFixed(0);
  if(el('spd-big'))el('spd-big').textContent=speed.toFixed(0);
  if(el('spd-t1'))el('spd-t1').textContent=Math.max(0,speed-20).toFixed(0);
  if(el('spd-t2'))el('spd-t2').textContent=(speed+20).toFixed(0);
  const hdg=((drone.rotY*180/Math.PI)%360+360)%360;
  updateDrum(hdg);
  const ch=document.getElementById('chromatic');
  if(speed>80)ch.classList.add('active');else if(proxI<.4)ch.classList.remove('active');
  renderer.render(scene,camera);
}
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);
  setTimeout(()=>{initMapCanvas();const pnc=el('prox-noise-canvas');if(pnc){pnc.width=innerWidth;pnc.height=innerHeight;}},50);
});
</script>
