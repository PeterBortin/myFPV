        .success button { color:#39ff14!important; border-color:#39ff14!important; }
        .success button:hover { background:#39ff14!important; color:#000!important; }

        #start-prompt { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.97); z-index:2000; display:flex; justify-content:center; align-items:center; }
        .start-box { text-align:center; padding:60px; border:2px solid rgba(57,255,20,0.6); background:linear-gradient(135deg,rgba(0,15,0,0.9),rgba(0,30,0,0.6)); clip-path:polygon(0 0,calc(100% - 25px) 0,100% 25px,100% 100%,25px 100%,0 calc(100% - 25px)); box-shadow:0 0 60px rgba(57,255,20,0.3),inset 0 0 40px rgba(57,255,20,0.05); }
        .start-title { font-family:'Orbitron',monospace; font-size:52px; font-weight:900; color:#39ff14; text-shadow:0 0 30px #39ff14,0 0 60px #00ff00; letter-spacing:8px; margin-bottom:8px; }
        .start-sub { font-family:'Share Tech Mono',monospace; color:rgba(57,255,20,0.5); font-size:11px; letter-spacing:4px; margin-bottom:40px; }
        .start-btn { background:transparent; color:#39ff14; border:1px solid #39ff14; padding:16px 45px; font-family:'Orbitron',monospace; cursor:pointer; font-size:14px; letter-spacing:6px; font-weight:700; transition:all 0.3s; }
        .start-btn:hover { background:#39ff14; color:#000; box-shadow:0 0 30px #39ff14; }
        .start-specs { margin-top:30px; font-size:9px; color:rgba(57,255,20,0.35); letter-spacing:2px; line-height:2.2; }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

<script>
// ═══════════════════════════════════════════════
const PHYSICS={ acceleration:90, friction:0.97, rotationSpeed:3.8, tiltMax:0.75, lift:55 };
const CHUNK_SIZE=300, TRACER_SPEED=240;

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000a00,0.006);
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1500);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setClearColor(0x010a01,1);
document.body.appendChild(renderer.domElement);

const clock=new THREE.Clock();
let isGameOver=false, isStaticActive=false, currentMissionTarget=null;

const droneState={
    pos:new THREE.Vector3((Math.random()-.5)*2000,60,(Math.random()-.5)*2000),
    vel:new THREE.Vector3(), rotY:Math.random()*Math.PI*2, tiltX:0, tiltZ:0
};

let droneGroup, payloadGroup, props=[];
const entities=[], staticObstacles=[], tracers=[], particles=[], missiles=[];
const activeChunks=new Set();
const trailPoints=[], trailMax=80;
let trailLine;

// ─── AUDIO ───────────────────────────────────────────
let audioCtx, droneOsc, droneOsc2, droneGain;
function initAudio(){
    try{
        audioCtx=new (window.AudioContext||window.webkitAudioContext)();
        droneOsc=audioCtx.createOscillator();
        droneOsc2=audioCtx.createOscillator();
        droneOsc.type=droneOsc2.type='sawtooth';
        droneOsc2.detune.value=9;
        droneGain=audioCtx.createGain(); droneGain.gain.value=0.038;
        const lpf=audioCtx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=1100; lpf.Q.value=0.9;
        const hpf=audioCtx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=50;
        const comp=audioCtx.createDynamicsCompressor(); comp.threshold.value=-20; comp.ratio.value=4;
        droneOsc.connect(lpf); droneOsc2.connect(lpf);
        lpf.connect(hpf); hpf.connect(comp); comp.connect(droneGain); droneGain.connect(audioCtx.destination);
        droneOsc.start(); droneOsc2.start();
    }catch(e){}
}

function playGunshot(vol=0.07){
    if(!audioCtx) return;
    const t=audioCtx.currentTime;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='square';
    o.frequency.setValueAtTime(240+Math.random()*100,t);
    o.frequency.exponentialRampToValueAtTime(35,t+0.1);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.13);
    o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+0.14);
    const frames=Math.floor(audioCtx.sampleRate*0.09);
    const buf=audioCtx.createBuffer(1,frames,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<frames;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/frames,1.8);
    const src=audioCtx.createBufferSource(), gn=audioCtx.createGain();
    const bpf=audioCtx.createBiquadFilter(); bpf.type='bandpass'; bpf.frequency.value=900; bpf.Q.value=0.6;
    gn.gain.setValueAtTime(vol*0.65,t); gn.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    src.buffer=buf; src.connect(bpf); bpf.connect(gn); gn.connect(audioCtx.destination);
    src.start(t); src.stop(t+0.1);
}

function playExplosion(big=false){
    if(!audioCtx) return;
    const t=audioCtx.currentTime, vol=big?0.75:0.45;
    const o=audioCtx.createOscillator(), gt=audioCtx.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(65,t); o.frequency.exponentialRampToValueAtTime(18,t+0.4);
    gt.gain.setValueAtTime(vol,t); gt.gain.exponentialRampToValueAtTime(0.001,t+0.42);
    o.connect(gt); gt.connect(audioCtx.destination); o.start(t); o.stop(t+0.44);
    const dur=big?2.8:1.3;
    const frames=Math.floor(audioCtx.sampleRate*dur);
    const buf=audioCtx.createBuffer(1,frames,audioCtx.sampleRate);
    const dd=buf.getChannelData(0);
    for(let i=0;i<frames;i++) dd[i]=(Math.random()*2-1)*Math.pow(1-i/frames,big?1.2:1.8);
    const src=audioCtx.createBufferSource();
    const lpf=audioCtx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=big?700:450;
    const gn=audioCtx.createGain();
    gn.gain.setValueAtTime(vol*0.85,t); gn.gain.exponentialRampToValueAtTime(0.001,t+dur);
    src.buffer=buf; src.connect(lpf); lpf.connect(gn); gn.connect(audioCtx.destination);
    src.start(t); src.stop(t+dur);
    if(big){
        const o2=audioCtx.createOscillator(), g2=audioCtx.createGain();
        o2.type='sawtooth';
        o2.frequency.setValueAtTime(200,t); o2.frequency.exponentialRampToValueAtTime(28,t+0.22);
        g2.gain.setValueAtTime(0.32,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.28);
        o2.connect(g2); g2.connect(audioCtx.destination); o2.start(t); o2.stop(t+0.3);
    }
}

function playMissileWhistle(dur=5){
    if(!audioCtx) return;
    const t=audioCtx.currentTime;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='sawtooth';
    o.frequency.setValueAtTime(780,t);
    o.frequency.exponentialRampToValueAtTime(180,t+dur);
    g.gain.setValueAtTime(0.001,t);
    g.gain.linearRampToValueAtTime(0.08,t+dur*0.25);
    g.gain.linearRampToValueAtTime(0.22,t+dur*0.8);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur+0.05);
    const lpf=audioCtx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=3500;
    o.connect(lpf); lpf.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t+dur+0.1);
    const nframes=Math.floor(audioCtx.sampleRate*dur);
    const nbuf=audioCtx.createBuffer(1,nframes,audioCtx.sampleRate);
    const nd=nbuf.getChannelData(0);
    for(let i=0;i<nframes;i++) nd[i]=(Math.random()*2-1)*0.4*(i/nframes);
    const nsrc=audioCtx.createBufferSource(), ng=audioCtx.createGain();
    const nhpf=audioCtx.createBiquadFilter(); nhpf.type='highpass'; nhpf.frequency.value=2000;
    ng.gain.setValueAtTime(0.001,t); ng.gain.linearRampToValueAtTime(0.06,t+dur);
    nsrc.buffer=nbuf; nsrc.connect(nhpf); nhpf.connect(ng); ng.connect(audioCtx.destination);
    nsrc.start(t); nsrc.stop(t+dur+0.05);
}

function createExplosion(pos,color=0xff5500,count=45,big=false){

    });
    if(big){

        ring.position.copy(pos); ring.rotation.x=Math.PI/2;

    }
    const shapes=[new THREE.BoxGeometry(.4,.4,.4),new THREE.TetrahedronGeometry(.5),new THREE.BoxGeometry(.2,1,.2)];
    for(let i=0;i<count;i++){
        const geo=shapes[i%3];

        const p=new THREE.Mesh(geo.clone(),new THREE.MeshBasicMaterial({color:col,transparent:true}));

        particles.push({mesh:p,vel,life:0.6+Math.random()*(big?2.2:1)});
        scene.add(p);
    }
    for(let i=0;i<(big?20:8);i++){
        const p=new THREE.Mesh(new THREE.SphereGeometry(.7+Math.random()*(big?3.5:1.8),6,6),
            new THREE.MeshBasicMaterial({color:big?0x333333:0x1a1a1a,transparent:true,opacity:.45}));

        const vel=new THREE.Vector3((Math.random()-.5)*5,4+Math.random()*(big?14:6),(Math.random()-.5)*5);
        particles.push({mesh:p,vel,life:(big?4.5:2.2)+Math.random()*1.5,isSmoke:true});
        scene.add(p);
    }
}

// ─── TERRAIN ─────────────────────────────────────────
function getTerrainHeight(x,z){
    return Math.sin(x*.008)*Math.cos(z*.008)*15
          +Math.tanh(Math.sin(x*.004)*5)*40
          +Math.sin(x*.06)*Math.cos(z*.06)*4;
}

function createGround(){
    const geo=new THREE.PlaneGeometry(10000,10000,220,220);
    geo.rotateX(-Math.PI/2);
    const v=geo.attributes.position.array;
    for(let i=0;i<v.length;i+=3) v[i+1]=getTerrainHeight(v[i],v[i+2]);
    geo.computeVertexNormals();
    const m=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:0x00bb00,wireframe:true,transparent:true,opacity:0.16}));
    m.add(new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:0x001500,transparent:true,opacity:0.22})));
    scene.add(m);
}

// ─── MINIMAP ─────────────────────────────────────────
const mCanvas=document.getElementById('minimap-canvas');
const mCtx=mCanvas.getContext('2d');
mCanvas.width=130; mCanvas.height=130;
function updateMinimap(){
    mCtx.clearRect(0,0,130,130);
    const sc=.35,cx=65,cy=65;
    mCtx.strokeStyle='rgba(57,255,20,0.07)'; mCtx.lineWidth=.5;
    for(let i=0;i<130;i+=13){mCtx.beginPath();mCtx.moveTo(i,0);mCtx.lineTo(i,130);mCtx.stroke();mCtx.beginPath();mCtx.moveTo(0,i);mCtx.lineTo(130,i);mCtx.stroke();}
    [20,42].forEach(r=>{mCtx.strokeStyle='rgba(57,255,20,0.1)';mCtx.beginPath();mCtx.arc(cx,cy,r,0,Math.PI*2);mCtx.stroke();});
    staticObstacles.forEach(o=>{
        const dx=(o.position.x-droneState.pos.x)*sc,dz=(o.position.z-droneState.pos.z)*sc;
        if(Math.abs(dx)<62&&Math.abs(dz)<62){mCtx.fillStyle='rgba(0,200,0,0.25)';mCtx.fillRect(cx+dx-2,cy+dz-2,4,4);}
    });
    entities.forEach(en=>{
        const dx=(en.mesh.position.x-droneState.pos.x)*sc,dz=(en.mesh.position.z-droneState.pos.z)*sc;
        if(Math.abs(dx)<62&&Math.abs(dz)<62){
            let col;
            if(en===currentMissionTarget) col='#ffff00';
            else if(en.type==='uav') col='#ff00ff';
            else if(en.type==='car') col=en.side==='hostile'?'#ff9900':'#00aaff';
            else col=en.side==='hostile'?'#ff3030':'#00ffff';
            mCtx.fillStyle=col; mCtx.shadowColor=col; mCtx.shadowBlur=4;
            const sz=en.type==='uav'?4:2.5;
            mCtx.fillRect(cx+dx-sz/2,cy+dz-sz/2,sz,sz); mCtx.shadowBlur=0;
        }
    });
    missiles.forEach(m=>{
        const dx=(m.pos.x-droneState.pos.x)*sc,dz=(m.pos.z-droneState.pos.z)*sc;
        if(Math.abs(dx)<62&&Math.abs(dz)<62){
            mCtx.fillStyle='#ff00ff'; mCtx.shadowColor='#ff00ff'; mCtx.shadowBlur=7;
            mCtx.fillRect(cx+dx-2.5,cy+dz-2.5,5,5); mCtx.shadowBlur=0;
        }
    });
    document.getElementById('minimap-arrow').style.transform=`translate(-50%,-50%) rotate(${-droneState.rotY}rad)`;
}

// ─── BUILDINGS (brighter edges + dark-green fill) ────
function spawnBuilding(x,z){
    if(tooClose(x,z)) return;
    const gY=getTerrainHeight(x,z);
    const w=18+Math.random()*22, h=22+Math.random()*45, d=18+Math.random()*22;
    const grp=new THREE.Group();
    const geo=new THREE.BoxGeometry(w,h,d);

    // Dark-green semi-transparent fill
    grp.add(new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:0x002200,transparent:true,opacity:0.55})));

    // BRIGHT wireframe edges
    const edgeMat=new THREE.LineBasicMaterial({color:0x00ff66,transparent:true,opacity:0.9});
    grp.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),edgeMat));

    // Glowing windows
    const winMat=new THREE.MeshBasicMaterial({color:0x00ff44,transparent:true,opacity:0.35});
    const winGlowMat=new THREE.MeshBasicMaterial({color:0x88ffaa,transparent:true,opacity:0.18});
    for(let i=0;i<6;i++){
        const win=new THREE.Mesh(new THREE.PlaneGeometry(2.2,2.2),winMat);
        const wx=(Math.random()-.5)*w*.75, wy=(Math.random()-.5)*h*.55;
        win.position.set(wx,wy,d/2+.12); grp.add(win);
        // soft glow behind window
        const gw=new THREE.Mesh(new THREE.PlaneGeometry(4,4),winGlowMat);
        gw.position.set(wx,wy,d/2+.1); grp.add(gw);
    }
    // Corner accent lines (vertical)
    const vMat=new THREE.LineBasicMaterial({color:0x44ffaa,opacity:0.7,transparent:true});
    [[-w/2,-d/2],[w/2,-d/2],[-w/2,d/2],[w/2,d/2]].forEach(([cx2,cz2])=>{
        const vg=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(cx2,-h/2,cz2),new THREE.Vector3(cx2,h/2,cz2)]);
        grp.add(new THREE.Line(vg,vMat));
    });

    grp.position.set(x,gY+h/2,z); scene.add(grp);
    staticObstacles.push({position:new THREE.Vector3(x,gY,z),radius:(w+d)/2.2,height:h,mesh:grp});
}

// ─── TRENCHES (L-shape, T-shape, straight) ───────────
function spawnTrench(x,z){
    if(tooClose(x,z,40)) return;
    const gY=getTerrainHeight(x,z);
    const shapes=['straight','L','T'];
    const shape=shapes[Math.floor(Math.random()*shapes.length)];
    const angle=Math.random()*Math.PI*2;
    const grp=new THREE.Group();
    const trenchDepth=3.5; // deeper than ground
    const trenchW=4, trenchL=40;

    // Dirt fill material (darker than ground)
    const dirtFill=new THREE.MeshBasicMaterial({color:0x0a0800,transparent:true,opacity:0.95});
    const wallMat=new THREE.MeshBasicMaterial({color:0x1a1400,wireframe:true,transparent:true,opacity:0.6});
    const rimMat=new THREE.LineBasicMaterial({color:0x886600,transparent:true,opacity:0.7});

    function addSegment(lx,lz,len,rot=0){
        // Sunken box
        const geo=new THREE.BoxGeometry(trenchW,trenchDepth,len);
        const fill=new THREE.Mesh(geo,dirtFill); fill.position.set(lx,-trenchDepth/2,lz); fill.rotation.y=rot; grp.add(fill);
        const walls=new THREE.Mesh(geo,wallMat); walls.position.set(lx,-trenchDepth/2,lz); walls.rotation.y=rot; grp.add(walls);
        // Rim (top edge outline)
        const hw=trenchW/2, hl=len/2;
        const rimPts=[
            new THREE.Vector3(-hw,0,-hl),new THREE.Vector3(hw,0,-hl),
            new THREE.Vector3(hw,0,hl),new THREE.Vector3(-hw,0,hl),
            new THREE.Vector3(-hw,0,-hl)
        ];
        const rimGeo=new THREE.BufferGeometry().setFromPoints(rimPts);
        const rim=new THREE.Line(rimGeo,rimMat); rim.position.set(lx,0,lz); rim.rotation.y=rot; grp.add(rim);
    }

    if(shape==='straight'){
        addSegment(0,0,trenchL);
    } else if(shape==='L'){
        addSegment(0,-trenchL/4,trenchL/2);           // vertical arm
        addSegment(trenchL/4,trenchL/4-2,trenchL/2,Math.PI/2); // horizontal arm
    } else { // T
        addSegment(0,0,trenchL);                        // main
        addSegment(trenchL/4+2,0,trenchL*0.55,Math.PI/2); // cross
    }

    grp.rotation.y=angle;
    grp.position.set(x,gY,z);
    scene.add(grp);

    // Spawn soldiers INSIDE trench (below terrain level)
    const soldierCount=6+Math.floor(Math.random()*5);
    for(let i=0;i<soldierCount;i++){
        const ox=(Math.random()-.5)*(trenchL*.8);
        const oz=(Math.random()-.5)*(trenchW*.5);
        // Transform offset by trench rotation
        const cosA=Math.cos(angle), sinA=Math.sin(angle);
        const wx=x+ox*cosA-oz*sinA;
        const wz=z+ox*sinA+oz*cosA;
        spawnSoldierInTrench(wx,wz,gY-1.8); // sunken
    }
}

// ─── ENEMY UAVs / DRONES ─────────────────────────────
function buildUavMesh(size, color){
    const grp=new THREE.Group();
    const mat=new THREE.MeshBasicMaterial({color,wireframe:true});

    // Arms (X pattern)
    const arm1=new THREE.Mesh(new THREE.BoxGeometry(size*1.6,.04*size,.04*size),mat); arm1.rotation.y=Math.PI/4;
    const arm2=new THREE.Mesh(new THREE.BoxGeometry(size*1.6,.04*size,.04*size),mat); arm2.rotation.y=-Math.PI/4;
    grp.add(arm1,arm2);
    // Central body
    grp.add(new THREE.Mesh(new THREE.BoxGeometry(size*.35,size*.2,size*.4),mat));
    // Prop rings
    const ringR=size*.3;
    [[size*.55,0,size*.55],[-(size*.55),0,size*.55],[size*.55,0,-(size*.55)],[-(size*.55),0,-(size*.55)]].forEach(p=>{
        const ring=new THREE.Mesh(new THREE.TorusGeometry(ringR,.018*size,5,14),mat);
        ring.position.set(...p); ring.rotation.x=Math.PI/2; grp.add(ring);
    });
    // Small payload
    const pay=new THREE.Mesh(new THREE.CylinderGeometry(size*.06,size*.06,size*.4,7),mat);
    pay.rotation.x=Math.PI/2; pay.position.y=-size*.2; grp.add(pay);
    return grp;
}

function spawnUAV(x,z){
    if(tooClose(x,z,60)) return;
    const gY=getTerrainHeight(x,z);
    const flyH=gY+30+Math.random()*80; // altitude 30-110m above ground
    const size=0.6+Math.random()*0.8;
    const hostile=Math.random()>.25; // mostly hostile
    const color=hostile?0xff3300:0x00ffcc;
    const mesh=buildUavMesh(size,color);
    mesh.position.set(x,flyH,z);
    scene.add(mesh);

    // Waypoint-based flight path (3-5 waypoints in a circuit)
    const wpCount=3+Math.floor(Math.random()*3);
    const waypoints=[];
    for(let i=0;i<wpCount;i++){
        const angle=(i/wpCount)*Math.PI*2+Math.random()*.5;
        const rad=80+Math.random()*200;
        waypoints.push(new THREE.Vector3(
            x+Math.cos(angle)*rad,
            flyH+(Math.random()-.5)*30,
            z+Math.sin(angle)*rad
        ));
    }

    // Propeller spin meshes (reuse rings by tracking separate prop angles)
    const uavProps=[];
    mesh.traverse(child=>{
        if(child instanceof THREE.Mesh && child.geometry instanceof THREE.TorusGeometry) uavProps.push(child);
    });

    entities.push({
        mesh, type:'uav', radius:1.5*size, height:0.6*size,
        side:hostile?'hostile':'neutral',
        speed:18+Math.random()*30,
        waypoints, wpIdx:0,
        dir:new THREE.Vector3(0,0,1),
        lastFire:0, props:uavProps,
        propAngle:0
    });
}

// ─── CHUNK GEN ───────────────────────────────────────
function generateChunk(ox,oz){
    for(let i=0;i<8;i++) spawnBuilding(ox+(Math.random()-.5)*CHUNK_SIZE,oz+(Math.random()-.5)*CHUNK_SIZE);
    for(let i=0;i<5;i++) spawnTank(ox+(Math.random()-.5)*CHUNK_SIZE,oz+(Math.random()-.5)*CHUNK_SIZE);
    for(let i=0;i<7;i++) spawnCar(ox+(Math.random()-.5)*CHUNK_SIZE,oz+(Math.random()-.5)*CHUNK_SIZE);
    for(let i=0;i<4;i++) spawnTrench(ox+(Math.random()-.5)*CHUNK_SIZE,oz+(Math.random()-.5)*CHUNK_SIZE);
    for(let i=0;i<3;i++) spawnUAV(ox+(Math.random()-.5)*CHUNK_SIZE,oz+(Math.random()-.5)*CHUNK_SIZE);
}

function updateChunks(){
    const cx=Math.floor(droneState.pos.x/CHUNK_SIZE),cz=Math.floor(droneState.pos.z/CHUNK_SIZE);
    for(let x=cx-1;x<=cx+1;x++) for(let z=cz-1;z<=cz+1;z++){
        const id=`${x},${z}`;
        if(!activeChunks.has(id)){generateChunk(x*CHUNK_SIZE,z*CHUNK_SIZE);activeChunks.add(id);}
    }
}

// ─── BALLISTIC MISSILES ───────────────────────────────
let nextMissileTime=18;
function spawnMissile(){
    const tx=droneState.pos.x+(Math.random()-.5)*900;
    const tz=droneState.pos.z+(Math.random()-.5)*900;
    const targetY=getTerrainHeight(tx,tz);
    const sh=550+Math.random()*350;
    const sx=tx+(Math.random()-.5)*400, sz=tz+(Math.random()-.5)*400;
    const target=new THREE.Vector3(tx,targetY,tz);
    const startPos=new THREE.Vector3(sx,sh,sz);
    const speed=170+Math.random()*70;
    const travelTime=startPos.distanceTo(target)/speed;
    playMissileWhistle(travelTime);
    nextMissileTime=clock.getElapsedTime()+18+Math.random()*22;
    const grp=new THREE.Group();
    const mat=new THREE.MeshBasicMaterial({color:0xff00ff,wireframe:true});
    grp.add(new THREE.Mesh(new THREE.CylinderGeometry(.28,.28,4.5,8),mat));
    const nose=new THREE.Mesh(new THREE.ConeGeometry(.28,1.4,8),mat); nose.position.y=2.95; grp.add(nose);
    for(let i=0;i<4;i++){
        const fin=new THREE.Mesh(new THREE.BoxGeometry(.05,.7,.9),mat);
        fin.position.y=-1.9; fin.rotation.y=i*Math.PI/2; grp.add(fin);
    }
    const eg=new THREE.Mesh(new THREE.SphereGeometry(.3,6,6),new THREE.MeshBasicMaterial({color:0x8800ff,transparent:true,opacity:0.7}));
    eg.position.y=-2.5; grp.add(eg);
    grp.position.copy(startPos); scene.add(grp);
    const cGeo=new THREE.BufferGeometry();
    cGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(120*3),3));
    const cLine=new THREE.Line(cGeo,new THREE.LineBasicMaterial({color:0xdd88ff,transparent:true,opacity:0.55}));
    scene.add(cLine);
    const pill=document.getElementById('pill-bm');
    pill.className='status-pill warn'; pill.textContent='⚡ BM: INBOUND!';
    const mw=document.getElementById('missile-warning');
    mw.style.display='block'; setTimeout(()=>mw.style.display='none',1500);
    missiles.push({mesh:grp,pos:startPos.clone(),target,dir:target.clone().sub(startPos).normalize(),speed,cLine,cPts:[startPos.clone()]});
}

function updateMissiles(dt,time){
    if(time>nextMissileTime&&missiles.length<4) spawnMissile();
    for(let i=missiles.length-1;i>=0;i--){
        const m=missiles[i];
        m.pos.addScaledVector(m.dir,m.speed*dt);
        m.mesh.position.copy(m.pos);
        m.mesh.lookAt(m.target); m.mesh.rotateX(Math.PI/2);
        m.cPts.push(m.pos.clone());
        if(m.cPts.length>60) m.cPts.shift();
        const cp=m.cLine.geometry.attributes.position.array;
        m.cPts.forEach((p,idx)=>{cp[idx*3]=p.x;cp[idx*3+1]=p.y;cp[idx*3+2]=p.z;});
        m.cLine.geometry.attributes.position.needsUpdate=true;
        m.cLine.geometry.setDrawRange(0,m.cPts.length);
        const gY=getTerrainHeight(m.pos.x,m.pos.z);
        let hit=m.pos.y<=gY+1.5;
        if(!hit) staticObstacles.forEach(o=>{
            const d2=new THREE.Vector2(m.pos.x,m.pos.z).distanceTo(new THREE.Vector2(o.position.x,o.position.z));
            if(d2<o.radius&&m.pos.y<o.position.y+o.height) hit=true;
        });
        if(hit){
            createExplosion(m.pos.clone(),0xff00ff,90,true);
            for(let j=entities.length-1;j>=0;j--){
                if(m.pos.distanceTo(entities[j].mesh.position)<40){
                    createExplosion(entities[j].mesh.position.clone(),0xff4400,20);
                    scene.remove(entities[j].mesh); entities.splice(j,1);
                }
            }
            document.getElementById('chromatic').classList.add('active');
            setTimeout(()=>document.getElementById('chromatic').classList.remove('active'),500);
            scene.remove(m.mesh); scene.remove(m.cLine);
            missiles.splice(i,1);
        }
    }
    if(missiles.length===0){const p=document.getElementById('pill-bm'); p.className='status-pill blue'; p.textContent='BM: CLEAR';}
}

// ─── AVOIDANCE ───────────────────────────────────────
function applyAvoidance(en){
    const ad=en.type==='tank'?25:en.type==='car'?18:en.type==='uav'?0:10;
    if(ad===0) return; // UAVs fly freely
    for(let o of staticObstacles){
        const dist=en.mesh.position.distanceTo(o.position);
        if(dist<ad+o.radius){
            const toO=o.position.clone().sub(en.mesh.position).normalize();
            if(toO.dot(en.dir)>.5){
                const left=new THREE.Vector3(-en.dir.z,0,en.dir.x);
                en.dir.addScaledVector(toO.dot(left)>0?left.negate():left,.18).normalize();
            }
        }
    }
}

// ─── TRACERS ─────────────────────────────────────────
function createTracer(start,target,color){
    const geo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,0,-8)]);
    const line=new THREE.Line(geo,new THREE.LineBasicMaterial({color,transparent:true,opacity:.9}));
    line.position.copy(start); line.lookAt(target); scene.add(line);
    tracers.push({mesh:line,dir:target.clone().sub(start).normalize(),life:1.2});
    playGunshot(.025);
}

// ─── ENTITIES UPDATE ─────────────────────────────────
function updateEntities(dt,time){
    entities.forEach(en=>{
        if(en.type==='tank'){
            applyAvoidance(en);
            en.mesh.position.addScaledVector(en.dir,en.speed*dt);
            en.mesh.position.y=getTerrainHeight(en.mesh.position.x,en.mesh.position.z)+.75;
            en.mesh.lookAt(en.mesh.position.clone().add(en.dir));
            if(time>en.lastFire){ createTracer(en.mesh.position.clone().add(new THREE.Vector3(0,1.5,0)),droneState.pos,0xff5500); en.lastFire=time+3+Math.random(); }
        }
        else if(en.type==='car'){
            if(en.isStopped){
                en.stopTimer-=dt;
                if(en.stopTimer<=0){ en.isStopped=false; en.dir.applyAxisAngle(new THREE.Vector3(0,1,0),(Math.random()-.5)*.9).normalize(); }
            } else {
                applyAvoidance(en);
                en.mesh.position.addScaledVector(en.dir,en.speed*dt);
                en.mesh.position.y=getTerrainHeight(en.mesh.position.x,en.mesh.position.z)+.45;
                en.mesh.lookAt(en.mesh.position.clone().add(en.dir));
                if(Math.random()<.0055){ en.isStopped=true; en.stopTimer=1.2+Math.random()*3.5; }
            }
            if(en.side==='hostile'&&time>en.lastFire&&droneState.pos.distanceTo(en.mesh.position)<210){
                createTracer(en.mesh.position.clone().add(new THREE.Vector3(0,.9,0)),droneState.pos,0xff6600);
                en.lastFire=time+1.8+Math.random()*2;
            }
        }
        else if(en.type==='soldier'){
            // Trench soldiers: stay at fixed depth, just rotate to face drone when close
            if(en.inTrench){
                en.mesh.position.y=en.trenchY+.9;
                const toDrone=droneState.pos.clone().sub(en.mesh.position);
                const dist=toDrone.length();
                if(dist<120&&time>en.lastFire){
                    createTracer(en.mesh.position.clone().add(new THREE.Vector3(0,1,0)),droneState.pos,0xffaa00);
                    en.lastFire=time+0.8+Math.random()*1.5;
                }
            } else if(en.speed>0){
                applyAvoidance(en);
                en.mesh.position.addScaledVector(en.dir,en.speed*dt);
                en.mesh.position.y=getTerrainHeight(en.mesh.position.x,en.mesh.position.z)+.9;
                if(time>en.lastFire&&droneState.pos.distanceTo(en.mesh.position)<180){
                    createTracer(en.mesh.position.clone().add(new THREE.Vector3(0,1,0)),droneState.pos,0xffaa00);
                    en.lastFire=time+1+Math.random()*2;
                }
            }
        }
        else if(en.type==='uav'){
            // Waypoint navigation
            if(en.waypoints.length>0){
                const wp=en.waypoints[en.wpIdx];
                const toWp=wp.clone().sub(en.mesh.position);
                const distWp=toWp.length();
                if(distWp<12){
                    en.wpIdx=(en.wpIdx+1)%en.waypoints.length;
                } else {
                    en.dir.lerp(toWp.normalize(),.04).normalize();
                }
            }
            en.mesh.position.addScaledVector(en.dir,en.speed*dt);
            // Gentle banking
            en.mesh.lookAt(en.mesh.position.clone().add(en.dir));
            // Prop spin
            en.propAngle=(en.propAngle||0)+dt*15;
            if(en.props) en.props.forEach((p,i)=>p.rotation.z+=(i%2===0?1:-1)*dt*14);
            // Hostile UAVs fire at player
            if(en.side==='hostile'&&time>en.lastFire&&droneState.pos.distanceTo(en.mesh.position)<200){
                createTracer(en.mesh.position.clone(),droneState.pos,0xff3300);
                en.lastFire=time+1.5+Math.random()*2;
            }
        }
    });
}

// ─── MISSION ─────────────────────────────────────────
function updateMission(){
    if(!currentMissionTarget||entities.indexOf(currentMissionTarget)===-1){
        const t=entities.filter(e=>e.side==='hostile');
        if(t.length>0) currentMissionTarget=t[Math.floor(Math.random()*t.length)];
    }
    if(currentMissionTarget){
        const dist=droneState.pos.distanceTo(currentMissionTarget.mesh.position);
        document.getElementById('obj-type').textContent=currentMissionTarget.type.toUpperCase();
        document.getElementById('obj-dist').textContent=`DST: ${dist.toFixed(1)}m`;
        const pts=[];
        for(let i=0;i<=20;i++){
            const a=i/20;
            const p=new THREE.Vector3().lerpVectors(droneState.pos,currentMissionTarget.mesh.position,a);
            const tY=getTerrainHeight(p.x,p.z)+2.5; if(p.y<tY) p.y=tY;
            pts.push(p);
        }
        pathLineGeo.setFromPoints(pts); pathLine.computeLineDistances();
    }
}

// ─── SEEKER ──────────────────────────────────────────
function updateSeeker(){
    let best=null, min=250;
    const ui=document.getElementById('target-ui');
    entities.forEach(en=>{
        const dist=droneState.pos.distanceTo(en.mesh.position);
        if(dist<min){
            const p=en.mesh.position.clone().project(camera);
            if(Math.abs(p.z)<1&&Math.abs(p.x)<.8&&Math.abs(p.y)<.8){
                min=dist; best={x:(p.x*.5+.5)*innerWidth,y:(p.y*-.5+.5)*innerHeight,type:en.type,dist,target:en};
            }
        }
    });
    if(best){
        ui.style.display='block'; ui.style.left=best.x+'px'; ui.style.top=best.y+'px';
        ui.className=best.target===currentMissionTarget?'priority':'';
        document.getElementById('target-label').textContent=best.type.toUpperCase();
        document.getElementById('target-dist').textContent=`${best.dist.toFixed(1)}m`;
    } else ui.style.display='none';
}

// ─── GAME OVER ───────────────────────────────────────
function endGame(success=false){
    if(isGameOver||isStaticActive) return;
    isStaticActive=true;
    createExplosion(droneState.pos.clone(),success?0xffff00:0xff2200,success?80:60,true);
    document.getElementById('static-noise').style.display='block';
    document.getElementById('chromatic').classList.add('active');
    setTimeout(()=>{
        isGameOver=true;
        document.getElementById('restart-screen').style.display='flex';
        const box=document.getElementById('screen-box');
        if(success){ box.className='screen-content success'; document.getElementById('res-msg').textContent='На, нахуй!'; document.getElementById('res-sub').textContent='Цель уничтожена!'; }
        else { document.getElementById('res-msg').textContent='Проебал!'; document.getElementById('res-sub').textContent='Сигнал потерян..'; }
    },1400);
}

// ─── INPUT ───────────────────────────────────────────
let input={left:{x:0,y:0},right:{x:0,y:0}};
nipplejs.create({zone:document.getElementById('joystick-left'),mode:'static',position:{left:'50%',top:'50%'},color:'#39ff14'})
    .on('move',(e,d)=>input.left=d.vector).on('end',()=>input.left={x:0,y:0});
nipplejs.create({zone:document.getElementById('joystick-right'),mode:'static',position:{left:'50%',top:'50%'},color:'white'})
    .on('move',(e,d)=>input.right=d.vector).on('end',()=>input.right={x:0,y:0});

// ─── INIT ────────────────────────────────────────────
createGround(); createDetailedDrone(); initTrail();

// ─── MAIN LOOP ───────────────────────────────────────
function animate(){
    if(isGameOver){ renderer.render(scene,camera); return; }
    requestAnimationFrame(animate);
    const dt=Math.min(clock.getDelta(),.05), time=clock.getElapsedTime();

    updateChunks(); updateEntities(dt,time); updateMissiles(dt,time);
    updateSeeker(); updateMission(); updateMinimap(); updateTrail();

    // Audio
    if(droneOsc){
        const f=65+droneState.vel.length()*3.5;
        droneOsc.frequency.setTargetAtTime(f,audioCtx.currentTime,.08);
        droneOsc2.frequency.setTargetAtTime(f+9,audioCtx.currentTime,.08);
    }

    // Props
    props.forEach((p,i)=>p.rotation.y+=(40+(input.left.y+1)*40)*dt*(i%2===0?1:-1));

    // Physics
    droneState.rotY-=input.left.x*PHYSICS.rotationSpeed*dt;
    droneState.tiltX=THREE.MathUtils.lerp(droneState.tiltX,-input.right.y*PHYSICS.tiltMax,.1);
    droneState.tiltZ=THREE.MathUtils.lerp(droneState.tiltZ,-input.right.x*PHYSICS.tiltMax,.1);
    const mDir=new THREE.Vector3(input.right.x,0,-input.right.y).applyAxisAngle(new THREE.Vector3(0,1,0),droneState.rotY);
    droneState.vel.addScaledVector(mDir,PHYSICS.acceleration*dt);
    droneState.vel.y+=(input.left.y*PHYSICS.lift-9.81)*dt;
    droneState.vel.multiplyScalar(PHYSICS.friction);
    droneState.pos.addScaledVector(droneState.vel,dt);

    // Drone mesh
    droneGroup.position.copy(droneState.pos);
    droneGroup.rotation.set(0,0,0);
    droneGroup.rotateY(droneState.rotY); droneGroup.rotateX(droneState.tiltX); droneGroup.rotateZ(droneState.tiltZ);

    // Camera
    camera.position.lerp(droneState.pos.clone().add(new THREE.Vector3(0,3,7).applyAxisAngle(new THREE.Vector3(0,1,0),droneState.rotY)),.15);
    camera.lookAt(droneState.pos);

    // Tracers
    for(let i=tracers.length-1;i>=0;i--){
        const t=tracers[i]; t.mesh.position.addScaledVector(t.dir,TRACER_SPEED*dt);
        t.life-=dt; t.mesh.material.opacity=Math.max(0,t.life*.8);
        if(t.life<=0){ scene.remove(t.mesh); tracers.splice(i,1); }
    }

    // Particles
    for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];
        p.mesh.position.addScaledVector(p.vel,dt);
        if(p.isRing){ p.mesh.scale.addScalar(dt*32); p.mesh.material.opacity=Math.max(0,p.life*1.4); }
        else if(p.isSmoke){ p.vel.multiplyScalar(.975); p.mesh.scale.addScalar(dt*2); p.mesh.material.opacity=Math.max(0,p.life*.3); }
        else if(p.isFlash){ p.mesh.scale.setScalar(p.mesh.scale.x+dt*22); p.mesh.material.opacity=Math.max(0,p.life*8); }
        else { p.vel.y-=9.81*dt; p.mesh.material.opacity=Math.max(0,p.life*.8); p.mesh.rotation.x+=dt*2.2; p.mesh.rotation.y+=dt*3.1; }
        p.life-=dt;
        if(p.life<=0){ scene.remove(p.mesh); particles.splice(i,1); }
    }

    // Collisions
    const curH=getTerrainHeight(droneState.pos.x,droneState.pos.z);
    if(droneState.pos.y<curH) endGame(false);
    staticObstacles.forEach(o=>{
        const d2=new THREE.Vector2(droneState.pos.x,droneState.pos.z).distanceTo(new THREE.Vector2(o.position.x,o.position.z));
        if(d2<o.radius&&droneState.pos.y<o.position.y+o.height) endGame(false);
    });
    entities.forEach(en=>{
        if(droneState.pos.distanceTo(en.mesh.position)<(en.radius+1.2)) endGame(en.side==='hostile');
    });

    // HUD
    const altAGL=Math.max(0,droneState.pos.y-curH);
    const speed=droneState.vel.length()*3.6;
    document.getElementById('alt-big').textContent=altAGL.toFixed(0);
    document.getElementById('spd-big').textContent=speed.toFixed(0);
    document.getElementById('alt-t1').textContent=Math.max(0,altAGL-20).toFixed(0);
    document.getElementById('alt-t2').textContent=(altAGL+20).toFixed(0);
    document.getElementById('spd-t1').textContent=Math.max(0,speed-20).toFixed(0);
    document.getElementById('spd-t2').textContent=(speed+20).toFixed(0);
    const hdg=((droneState.rotY*180/Math.PI)%360+360)%360;
    document.getElementById('heading-deg').textContent=hdg.toFixed(0).padStart(3,'0')+'°';
    const ch=document.getElementById('chromatic');
    if(speed>90) ch.classList.add('active'); else ch.classList.remove('active');
    const cl=entities.filter(e=>e.side==='hostile').reduce((c,en)=>{const d=droneState.pos.distanceTo(en.mesh.position);return(!c||d<c.d)?{d}:c;},null);
    const pt=document.getElementById('pill-threat');
    if(cl&&cl.d<100){pt.className='status-pill warn';pt.textContent='⚡ THREAT: CRITICAL';}
    else{pt.className='status-pill hot';pt.textContent='THREAT: HIGH';}
    // UAV counter
    const uavCount=entities.filter(e=>e.type==='uav'&&e.side==='hostile').length;
    const pu=document.getElementById('pill-uav');
    pu.textContent=`UAV: ${uavCount}`;
    pu.className=uavCount>0?'status-pill purple':'status-pill blue';

    renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight);
});
</script>
